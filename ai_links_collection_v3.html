<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Links Collection — v3</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #273548;
            --bg-expanded: #1a2436;
            --border: #334155;
            --border-light: #475569;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #60a5fa;
            --accent-purple: #a78bfa;
            --accent-green: #34d399;
            --accent-amber: #fbbf24;
            --accent-rose: #fb7185;
            --accent-cyan: #22d3ee;
            --accent-teal: #2dd4bf;
            --accent-orange: #fb923c;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px 16px;
            position: sticky; top: 0; z-index: 100;
        }
        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 1.3em; font-weight: 600;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats {
            font-size: 0.85em; color: var(--text-muted);
        }
        .stats span { color: var(--accent-blue); font-weight: 600; }

        /* SEARCH BAR */
        .search-container {
            margin-bottom: 12px;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent-blue); }
        .search-wrapper {
            position: relative;
        }
        .search-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.9em;
        }
        .search-clear {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1.1em; display: none;
        }
        .search-clear.visible { display: block; }

        /* FILTER BAR */
        .filters {
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
        }
        .filter-group {
            display: flex; gap: 4px; align-items: center;
            margin-right: 8px;
        }
        .filter-label {
            font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); margin-right: 4px; font-weight: 600;
        }
        .pill {
            padding: 3px 10px; border-radius: 12px; font-size: 0.75em; font-weight: 500;
            cursor: pointer; border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); transition: all 0.15s; white-space: nowrap;
        }
        .pill:hover { border-color: var(--text-muted); color: var(--text-primary); }
        .pill.active-blue { background: rgba(96,165,250,0.2); border-color: var(--accent-blue); color: var(--accent-blue); }
        .pill.active-purple { background: rgba(167,139,250,0.2); border-color: var(--accent-purple); color: var(--accent-purple); }
        .pill.active-green { background: rgba(52,211,153,0.2); border-color: var(--accent-green); color: var(--accent-green); }
        .pill.active-amber { background: rgba(251,191,36,0.2); border-color: var(--accent-amber); color: var(--accent-amber); }
        .pill.active-rose { background: rgba(251,113,133,0.2); border-color: var(--accent-rose); color: var(--accent-rose); }
        .pill.active-cyan { background: rgba(34,211,238,0.2); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .pill.active-teal { background: rgba(45,212,191,0.2); border-color: var(--accent-teal); color: var(--accent-teal); }
        .pill.active-orange { background: rgba(251,146,60,0.2); border-color: var(--accent-orange); color: var(--accent-orange); }

        /* VIEW TOGGLE */
        .view-controls {
            display: flex; gap: 8px; align-items: center;
        }
        .view-btn {
            padding: 4px 12px; border-radius: var(--radius); font-size: 0.8em;
            cursor: pointer; border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); transition: all 0.15s;
        }
        .view-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .group-toggle {
            padding: 4px 12px; border-radius: var(--radius); font-size: 0.8em;
            cursor: pointer; border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); transition: all 0.15s;
        }
        .group-toggle.active { background: rgba(167,139,250,0.2); border-color: var(--accent-purple); color: var(--accent-purple); }

        /* CONTENT AREA */
        .content { padding: 16px 32px 48px; max-width: 1200px; margin: 0 auto; }

        /* GROUP HEADERS */
        .group-header {
            font-size: 1.05em; font-weight: 600; color: var(--accent-purple);
            padding: 16px 0 8px; border-bottom: 1px solid var(--border);
            margin-top: 16px; display: flex; justify-content: space-between; align-items: center;
        }
        .group-header:first-child { margin-top: 0; }
        .group-count {
            font-size: 0.75em; color: var(--text-muted); font-weight: 400;
            background: rgba(167,139,250,0.1); padding: 2px 8px; border-radius: 10px;
        }

        /* LIST ROW (collapsed) */
        .row-wrapper {
            border-bottom: 1px solid rgba(51,65,85,0.5);
            border-radius: var(--radius);
            transition: background 0.15s;
        }
        .row-wrapper:hover { background: var(--bg-card-hover); }
        .row-wrapper.expanded {
            background: var(--bg-expanded);
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 4px 0 8px;
        }
        .row {
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 8px;
            align-items: start;
            padding: 10px 12px;
            cursor: pointer;
        }
        .row-date {
            font-size: 0.78em; color: var(--text-muted); font-family: monospace; white-space: nowrap;
            padding-top: 2px;
        }
        .row-main {
            display: flex; flex-direction: column; gap: 3px; min-width: 0;
        }
        .row-title-line {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        }
        .row-title {
            font-size: 0.9em; font-weight: 500; color: var(--text-primary);
        }
        .row-title .author-name { color: var(--accent-blue); }
        .row-tags {
            display: flex; gap: 4px; flex-shrink: 0; align-items: center; flex-wrap: wrap;
        }
        .row-snippet {
            font-size: 0.82em; color: var(--text-secondary); line-height: 1.5;
        }
        .tag {
            font-size: 0.65em; padding: 2px 7px; border-radius: 8px; white-space: nowrap;
            font-weight: 500;
        }
        .tag-topic { background: rgba(96,165,250,0.15); color: var(--accent-blue); }
        .tag-now { background: rgba(251,113,133,0.2); color: var(--accent-rose); }
        .tag-near { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
        .tag-long { background: rgba(52,211,153,0.15); color: var(--accent-green); }
        .tag-preview { background: rgba(251,146,60,0.15); color: var(--accent-orange); font-style: italic; }

        /* EXPANDED CARD (now inside row-wrapper) */
        .row-expanded {
            padding: 4px 20px 16px;
            padding-left: 92px; /* align with content after date column */
            animation: slideDown 0.15s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .expanded-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 10px;
        }
        .expanded-author {
            font-size: 1em; font-weight: 600; color: var(--text-primary);
        }
        .expanded-handle {
            font-size: 0.85em; color: var(--accent-blue); margin-left: 6px;
        }
        .expanded-date {
            font-size: 0.8em; color: var(--text-muted); white-space: nowrap;
        }
        .expanded-subject {
            font-size: 0.82em; color: var(--accent-amber); margin-bottom: 8px;
            font-style: italic;
        }
        .expanded-summary {
            font-size: 0.9em; color: var(--text-secondary); line-height: 1.6;
            margin-bottom: 10px;
        }
        .expanded-notes {
            font-size: 0.85em; color: var(--accent-amber); background: rgba(251,191,36,0.08);
            border-left: 3px solid var(--accent-amber); padding: 6px 12px;
            border-radius: 0 var(--radius) var(--radius) 0; margin-bottom: 10px;
        }
        .expanded-meta {
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
        }
        .expanded-meta .tag { font-size: 0.72em; }
        .expanded-link {
            font-size: 0.8em; color: var(--accent-blue); text-decoration: none;
            margin-left: auto;
        }
        .expanded-link:hover { text-decoration: underline; }
        .expanded-views {
            font-size: 0.75em; color: var(--text-muted);
        }

        /* CARD VIEW */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px; margin-top: 8px;
        }
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; transition: all 0.15s;
        }
        .card:hover { border-color: var(--border-light); background: var(--bg-card-hover); }
        .card-header {
            display: flex; justify-content: space-between; margin-bottom: 8px;
        }
        .card-author { font-weight: 600; font-size: 0.9em; }
        .card-handle { color: var(--accent-blue); font-size: 0.8em; }
        .card-date { color: var(--text-muted); font-size: 0.78em; }
        .card-subject { font-size: 0.8em; color: var(--accent-amber); font-style: italic; margin-bottom: 6px; }
        .card-summary { font-size: 0.85em; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }
        .card-notes {
            font-size: 0.8em; color: var(--accent-amber); background: rgba(251,191,36,0.08);
            border-left: 3px solid var(--accent-amber); padding: 4px 10px;
            border-radius: 0 4px 4px 0; margin-bottom: 10px;
        }
        .card-footer { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
        .card-link {
            font-size: 0.78em; color: var(--accent-blue); text-decoration: none; margin-left: auto;
        }
        .card-link:hover { text-decoration: underline; }

        /* NO RESULTS */
        .no-results {
            text-align: center; padding: 48px; color: var(--text-muted);
        }
        .no-results h3 { color: var(--text-secondary); margin-bottom: 8px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header { padding: 16px; }
            .content { padding: 12px 16px; }
            .row { grid-template-columns: 58px 1fr; }
            .row-tags { display: none; }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h1>AI Links Collection</h1>
        <div class="view-controls">
            <button class="group-toggle active" onclick="toggleGrouping()" id="groupBtn">Grouped</button>
            <button class="view-btn active" onclick="setView('list')" id="listBtn">List</button>
            <button class="view-btn" onclick="setView('cards')" id="cardsBtn">Cards</button>
        </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">&#128269;</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search by author, topic, content, date..." oninput="onSearch()">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">&times;</button>
        </div>
    </div>
    <div class="filters">
        <div class="filter-group">
            <span class="filter-label">Topic</span>
            <button class="pill" data-filter="topic" data-value="agent-design" data-active="active-blue" onclick="toggleFilter(this)">Agent Design</button>
            <button class="pill" data-filter="topic" data-value="claude-code" data-active="active-purple" onclick="toggleFilter(this)">Claude Code</button>
            <button class="pill" data-filter="topic" data-value="dev-practices" data-active="active-green" onclick="toggleFilter(this)">Dev Practices</button>
            <button class="pill" data-filter="topic" data-value="skills-mcp" data-active="active-teal" onclick="toggleFilter(this)">Skills & MCP</button>
            <button class="pill" data-filter="topic" data-value="prompting" data-active="active-amber" onclick="toggleFilter(this)">Prompting</button>
            <button class="pill" data-filter="topic" data-value="research" data-active="active-cyan" onclick="toggleFilter(this)">Research</button>
            <button class="pill" data-filter="topic" data-value="industry" data-active="active-rose" onclick="toggleFilter(this)">Industry</button>
            <button class="pill" data-filter="topic" data-value="management" data-active="active-orange" onclick="toggleFilter(this)">Management</button>
            <button class="pill" data-filter="topic" data-value="questionable" data-active="active-rose" onclick="toggleFilter(this)">Questionable</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">Priority</span>
            <button class="pill" data-filter="priority" data-value="now" data-active="active-rose" onclick="toggleFilter(this)">Now</button>
            <button class="pill" data-filter="priority" data-value="near-term" data-active="active-amber" onclick="toggleFilter(this)">Near-term</button>
            <button class="pill" data-filter="priority" data-value="long-term" data-active="active-green" onclick="toggleFilter(this)">Long-term</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">Audience</span>
            <button class="pill" data-filter="audience" data-value="me" data-active="active-blue" onclick="toggleFilter(this)">Me</button>
            <button class="pill" data-filter="audience" data-value="dev-team" data-active="active-purple" onclick="toggleFilter(this)">Dev Team</button>
            <button class="pill" data-filter="audience" data-value="leadership" data-active="active-amber" onclick="toggleFilter(this)">Leadership</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">Status</span>
            <button class="pill" data-filter="enriched" data-value="true" data-active="active-green" onclick="toggleFilter(this)">Enriched</button>
            <button class="pill" data-filter="enriched" data-value="false" data-active="active-orange" onclick="toggleFilter(this)">Preview</button>
        </div>
    </div>
</div>

<div class="content" id="content"></div>

<script>
const POSTS = [
  { id: 'post-0', date: '2026-05-05', author: 'Adam Ghowiba', handle: '@adamghowiba', subject: 'Post by Adam Ghowiba on X', url: 'https://x.com/adamghowiba/status/2050886233921061281', summary: 'JP Morgan\'s investment research team broke down their "Ask David" multi-agent architecture: a supervisor agent orchestrates specialized subagents (retrieval, structured data, analytics), with an LLM-as-judge reflection node before the answer ships and human-in-the-loop for the last accuracy gap. Same supervisor + specialist + reflection pattern showing up everywhere.', topics: ["agent-design", "industry"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '1.9M', notes: '', enriched: true, content: 'Adam Ghowiba\n@adamghowiba\nJP Morgan\'s investment research team just shared exactly how they built their multi-agent system "Ask David", and it\'s the same architecture pattern showing up everywhere:\n\n- supervisor agent orchestrates\n- specialized subagents handle retrieval, structured data, analytics\n- LLM-as-judge reflection node before the answer ships\n- human-in-the-loop for the last accuracy gap\n\nworth watching for anyone building:' },
  { id: 'post-1', date: '2026-05-02', author: 'Dave Kline', handle: '@dklineii', subject: 'Post by Dave Kline on X (read plz)', url: 'https://x.com/dklineii/status/2050563237490344194', summary: 'A 15-minute manager/employee playbook for resetting expectations when someone is stuck — Kline argues 95% of work problems trace back to unclear expectations. Practical management tactic, no AI angle.', topics: ["management"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '52.3K', notes: 'Subject modified — Jeremy flagged as worth reading', enriched: true, content: '95% of work problems are caused by one thing: unclear expectations. Here\'s my simple playbook you can run to get (and stay) on the same page in 15 minutes.' },
  { id: 'post-2', date: '2026-05-02', author: 'Ole Lehmann', handle: '@itsolelehmann', subject: 'Post by Ole Lehmann on X', url: 'https://x.com/itsolelehmann/status/2050548948419645488', summary: 'Argues you should run a \'premortem\' on your plans with Claude — frame it as \'it\'s 6 months from now, this plan died, tell me how\' — to bypass the model\'s optimism bias. Cites Kahneman; says Google, Goldman, P&G use it before launches.', topics: ["prompting", "management"], audience: ["me", "leadership", "dev-team"], priority: 'now', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'POV: claude traveled 6 months into the future and told you exactly how your next move failed — it\'s called a premortem. Daniel Kahneman called it his single most valuable decision-making technique.' },
  { id: 'post-3', date: '2026-05-02', author: '0xSero', handle: '@0xsero', subject: 'Post by 0xSero on X', url: 'https://x.com/0xsero/status/2050544304360165585', summary: 'Reminder that Claude Code session history is auto-deleted monthly unless you change settings.json — that\'s all valuable training/context data. 0xSero shares a backup repo (github.com/0xSero/ai-data-extraction) to help you preserve it.', topics: ["claude-code", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '17.3K', notes: '', enriched: true, content: 'Everyone should save their session history, did u know all your Claude code sessions get deleted every month unless you change that in settings.json? All that is valuable training data they\'re keeping\\! So you should too.' },
  { id: 'post-4', date: '2026-05-02', author: 'darkzodchi', handle: '@zodchiii', subject: 'Post by darkzodchi on X', url: 'https://x.com/zodchiii/status/2050537397377532341', summary: 'Promotes a security article + .gitignore template after citing that Anthropic allegedly leaked 512K lines of source code from a missing .gitignore entry. Boris Cherny (Claude Code creator) cited as the cautionary tale. Engagement framing, but the .gitignore best-practices angle is legitimately useful.', topics: ["dev-practices", "claude-code", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '40.9K', notes: '', enriched: true, content: 'The Creator of Claude Code, Boris Cherny, just explained why most developers are likely to leak every secret they have. Anthropic leaked 512,000 lines of their own source code because someone forgot to add one line to an ignore file.' },
  { id: 'post-5', date: '2026-05-02', author: 'Blaze', handle: '@browomo', subject: 'Post by Blaze on X', url: 'https://x.com/browomo/status/2050509770604331510', summary: 'French teenager built a 3D map of 217 mental models (1284 connections) controlled by hand gestures + voice, running Three.js + MediaPipe Hands + local Whisper + Claude API + Google Antigravity. Whole stack assembled in one weekend; 80ms gesture-to-graph latency, runs from a 47MB Obsidian vault on a regular laptop.', topics: ["agent-design", "claude-code"], audience: ["me", "dev-team"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'French teenager built a 3D map of his knowledge and controls it with voice and fingers through Claude + Antigravity. 5 components: Three.js, MediaPipe Hands, local Whisper, Claude API, Google Antigravity. Built in 1 weekend.' },
  { id: 'post-6', date: '2026-05-02', author: 'Muhammad Ayan', handle: '@socialwithaayan', subject: 'Post by Muhammad Ayan on X', url: 'https://x.com/socialwithaayan/status/2050484688968724820', summary: 'Pointer to github.com/warpdotdev/warp — Warp terminal\'s source has been published as \'an agentic development environment, born out of the terminal.\' Worth a look as a coding-agent shell.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '2,763', notes: '', enriched: true, content: 'repo: github.com/warpdotdev/warp — Warp is an agentic development environment, born out of the terminal.' },
  { id: 'post-7', date: '2026-05-02', author: 'Kpaxs', handle: '@kpaxs', subject: 'Post by Kpaxs on X', url: 'https://x.com/kpaxs/status/2050470605804216695', summary: 'Kpaxs reframes high-agency behavior: \'I\'m doing this unless someone stops me\' vs \'Can I do this?\' — most permissions get granted retroactively, so it\'s easier to ask forgiveness than permission. Useful framing for engineering culture and AI adoption.', topics: ["management"], audience: ["me", "leadership", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '120.5K', notes: '', enriched: true, content: 'Low-agency: \'Can I do this?\' High-agency: \'I\'m doing this unless someone stops me.\' The high-agency person has realized that most permissions are granted retroactively.' },
  { id: 'post-8', date: '2026-05-02', author: 'Om Patel', handle: '@om_patel5', subject: 'Post by Om Patel on X (worth a look)', url: 'https://x.com/om_patel5/status/2050441119003971683', summary: 'Promoted Claude Code skill /graphify that pre-builds a graph of your codebase (functions, deps, docs, PDFs, images, audio, video via Whisper) so Claude doesn\'t waste tokens exploring. Author claims \'71.5x more efficient\' (engagement-farming framing).', topics: ["claude-code", "skills-mcp", "agent-design", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Subject modified — Jeremy flagged as worth a look', enriched: true, content: 'THIS CLAUDE CODE SKILL MAKES CLAUDE 71.5X MORE EFFICIENT — /graphify maps every function, every dependency upfront. Extracts code structure locally with tree-sitter AST in 25 languages, transcribes audio/video with whisper, uses Claude vision for images.' },
  { id: 'post-9', date: '2026-05-02', author: 'Tom Doerr', handle: '@tom_doerr', subject: 'Post by Tom Dörr on X', url: 'https://x.com/tom_doerr/status/2050312101504094651', summary: 'Curated awesome-list at github.com/EvoMap/awesome-agent-evolution covering AI agent evolution, memory systems, and self-improvement.', topics: ["agent-design", "research"], audience: ["me", "dev-team"], priority: 'long-term', sourceType: 'tweet', views: '5,637', notes: '', enriched: true, content: 'Curated list of AI agent evolution, memory systems, and self-improvement' },

  { id: 'post-15', date: '2026-05-02', author: 'Mike Bespalov', handle: '@bbssppllvv', subject: 'Post by Mike Bespalov on X', url: 'https://x.com/bbssppllvv/status/2049924037111841027', summary: 'Refero.design publishes 2000 DESIGN.md files (colors, type, spacing, layouts) extracted from the world\'s best products, structured for an LLM to read so coding agents stop producing ugly UIs. Free at styles.refero.design.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '1.4M', notes: '', enriched: true, content: 'Agents make ugly UIs because they\'ve never seen good design. We\'ve been fixing that, 2,000 DESIGN.md files from the world\'s best products, structured for a model to read and learn.' },

  { id: 'post-18', date: '2026-05-01', author: 'Akshay', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2050201509821063576', summary: 'Walkthrough of why Claude skills fail silently and how progressive disclosure works: Tier 1 = YAML frontmatter (~100 tokens, always loaded), Tier 2 = SKILL.md body (loads on trigger from description), Tier 3 = bundled scripts (loaded on demand, only stdout enters context). Description quality determines triggering.', topics: ["claude-code", "skills-mcp", "prompting"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'How to write Skills that never fail. Skills run on progressive disclosure, a 3-tier loading system. Tier 1: Metadata (always loaded). Tier 2: SKILL.md body (loaded on trigger). Tier 3: Bundled resources (loaded on demand).' },
  { id: 'post-19', date: '2026-05-01', author: 'Allen Braden', handle: '@allen_explains', subject: 'Post by Allen Braden on X', url: 'https://x.com/allen_explains/status/2050163013165224332', summary: 'Engagement-farming claim that a \'junior at Jane Street\' landed $220K-600K by using AI on trillions of data points. Community Note corrects: it\'s actually a 2024 Horace He talk on ML systems infra at Jane Street — he was a guest speaker, not an employee, and it has nothing to do with AI for trading.', topics: ["questionable", "industry"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '860K', notes: '', enriched: true, content: 'A junior at Jane Street reportedly landed a $220K–$600K role because he used AI to analyze trillions of data points faster than most teams ever could. [Community Note: actually a 2024 Horace He talk on ML systems infra; he is not a Jane Street employee.]' },
  { id: 'post-20', date: '2026-05-01', author: '摆烂程序媛', handle: '@wanerfu', subject: 'Post by 摆烂程序媛 on X', url: 'https://x.com/wanerfu/status/2050158295911137370', summary: 'Translated-from-Chinese promotion of Scrapling (github.com/D4Vinci/Scrapling) — open-source web scraper claiming Cloudflare bypass with no selector maintenance and \'774x faster than BeautifulSoup\'. Useful for AI scrape pipelines if benchmark holds up.', topics: ["dev-practices", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '270.2K', notes: '', enriched: true, content: 'OpenClaw (Scrapling) can now scrape any website without being blocked—zero bot detection, native bypass of Cloudflare, 774 times faster than BeautifulSoup. Open source.' },
  { id: 'post-21', date: '2026-05-01', author: 'Teknium', handle: '@teknium', subject: 'Post by Teknium 🪽 on X', url: 'https://x.com/teknium/status/2050098631907434871', summary: 'Teknium ships a /goal command in NousResearch hermes-agent (PR github.com/NousResearch/hermes-agent/pull/18262) — supervisor-loop pattern inspired by ralph loops + Codex\'s upcoming /goal: keeps re-prompting the agent until the supervisor judges the task complete.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '360.5K', notes: '', enriched: true, content: '/goal <prompt> starts a loop with a supervisor model determining whether the task completed at the end of an agent loop — if not, it forces it to keep going. Inspired by ralph loops and Codex\'s upcoming /goal.' },
  { id: 'post-22', date: '2026-05-01', author: 'Qwen', handle: '@alibaba_qwen', subject: 'Post by Qwen on X', url: 'https://x.com/alibaba_qwen/status/2049861145574690992', summary: 'Alibaba Qwen team open-sources Qwen-Scope, a suite of sparse autoencoders (SAEs) for the Qwen model family. Surfaces interpretable internal features for steering inference, classifying/synthesizing data, debugging code-switching/repetition at the source, and selecting smarter benchmarks. Blog at qwen.ai/blog?id=qwen-scope, weights on HuggingFace.', topics: ["research", "industry"], audience: ["me", "dev-team"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Qwen-Scope: open suite of sparse autoencoders for the Qwen model family. Steer outputs via internal features, classify/synthesize targeted data, trace code-switching back to source, analyze feature activation for benchmark selection.' },
  { id: 'post-23', date: '2026-04-30', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2049720409965392052', summary: 'Garry Tan (YC President & CEO) shipping 10 PRs to GBrain — his personal AI/markdown \'second brain\' tool — focused on quality-of-life improvements to make it scale across a corpus of 74k markdown files.', topics: ["dev-practices", "general"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '10.4K', notes: '', enriched: true, content: 'Literally have 10 PR\'s to drop tonight on GBrain, here\'s the first one. Lots of quality of life stuff, this is what it takes to make GBrain work on a brain pushing 74k markdown files' },
  { id: 'post-24', date: '2026-04-30', author: 'How To AI', handle: '@howtoai_', subject: 'Post by How To AI on X', url: 'https://x.com/howtoai_/status/2049567036003795269', summary: 'Tencent\'s Training-Free GRPO claims to replace expensive RL fine-tuning by extracting the \'semantic advantage\' from trial-and-error and injecting it as a \'token prior\' / memory rather than updating weights — reportedly trained for $18. Hype-framed ("killed fine-tuning") but the underlying technique is a notable alternative to GRPO/RLHF that avoids overfitting and GPU costs.', topics: ["research", "agent-design", "questionable"], audience: ["me", "dev-team"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Tencent has killed fine-tuning and RL with a $18 budget. Right now, if you want an AI agent to become an expert at a specific, complex real-world task, you have to use Reinforcement Learning... This is the exact optimization technique (GRPO) that DeepSeek used... Tencent killed this bottleneck forever.. by building Training-Free GRPO. Instead of spending thousands of dollars to permanently alter the AI\'s brain, they asked: What if we just distill the experience of learning, and inject it as a memory? They run the AI through the exact same trial-and-error process. But instead of updating the weights, they extract the \'semantic advantage\'—the actual logic of why one answer was better than another. They compress this winning logic into a \'token prior\', a tiny package of...' },
  { id: 'post-25', date: '2026-04-30', author: 'Akshay', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2049476617144287719', summary: 'Akshay rebuilt \'OpenClaw\' core in a single Sim Studio workflow (25 blocks, 29 connections, short+long-term memory, Telegram+Slack channels) without manual coding — pitched as an \'OS for your AI workforce.\' Stack is open-source and self-hostable: github.com/simstudioai/sim', topics: ["agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'I rebuilt most of OpenClaw\'s core in a single workflow: 25 blocks, 29 connections, Short + long-term memory, Multi-channel (Telegram + Slack). Didn\'t build it manually. Stack is fully open-source. Self-host, run local models, own it end-to-end. Full walkthrough... If you want to see the open-source stack that powers all of this, check out Sim on GitHub: https://github.com/simstudioai/sim' },
  { id: 'post-26', date: '2026-04-30', author: 'Darshak Rana', handle: '@thedarshakrana', subject: 'Post by Darshak Rana ⚡️ on X', url: 'https://x.com/thedarshakrana/status/2049151671692136778', summary: 'Long-form personal development X article (\'Your Next 5 Years Will Be an Exact Copy of Your Last 5\') riffing on the marshmallow test and the idea that personality is a set of learned thought patterns rather than fixed identity. 1.1M views — engagement-farming framing; not AI-related but Jeremy flagged it.', topics: ["questionable", "general"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '1.1M', notes: '', enriched: true, content: 'Your Next 5 years Will Be an Exact Copy Of Your Last 5. 99.99% people are failing a test designed for four-year-olds... [marshmallow test essay on identity, self-development, and behavioral patterns — non-AI personal-development content, ~13K chars]' },

  { id: 'post-44', date: '2026-04-23', author: 'vida', handle: '@vida_agent', subject: 'Post by vida on X', url: 'https://x.com/vida_agent/status/2047007924279767332', summary: 'OpenChronicle — open-sourced local-first memory layer for tool-capable LLMs and agents, positioned as a free alternative to OpenAI\'s $100/mo Chronicle. Repo: github.com/Einsia/OpenChronicle. Treats AI memory as infrastructure.', topics: ["agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '180K', notes: '', enriched: true, content: '' },
  { id: 'post-45', date: '2026-04-23', author: 'Alex Volkov', handle: '@altryne', subject: 'Post by Alex Volkov on X (4 Logan)', url: 'https://x.com/altryne/status/2046977133013311814', summary: 'OpenAI open-sourced a 1.5B parameter (50M active) Privacy Filter model on HuggingFace under Apache 2.0 — a PII detection model for checking if text contains private information. Not a new LLM but a purpose-built classifier for data pipelines.', topics: ["research", "industry"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '161K', notes: 'Modified subject — flagged for Logan', enriched: true, content: '' },
  { id: 'post-46', date: '2026-04-23', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2046882636069798323', summary: 'Garry Tan endorsing a workflow: build a feature once in OpenClaw, then run /skillify to turn it into a reusable skill forever. Quote-tweeting an article on stopping agents from making repeat mistakes (contrasting with LangChain/LangSmith eval-heavy approach).', topics: ["claude-code", "skills-mcp", "agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '269.5K', notes: '', enriched: true, content: '' },
  { id: 'post-47', date: '2026-04-23', author: 'spencer', handle: '@techspence', subject: 'Post by spencer on X', url: 'https://x.com/techspence/status/2046759185593794782', summary: 'OWASP released their Autonomous Penetration Testing Standard (APTS). Repo: github.com/OWASP/APTS. Spencer hasn\'t read it yet, asking for community input — worth a look for anyone building/evaluating autonomous security agents.', topics: ["agent-design", "industry"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '110.1K', notes: '', enriched: true, content: '' },
  { id: 'post-48', date: '2026-04-23', author: 'Avi Chawla', handle: '@_avichawla', subject: 'Post by Avi Chawla on X', url: 'https://x.com/_avichawla/status/2046685172666712571', summary: 'Claim of 3x token reduction on Claude Code (10.4M→3.7M tokens, $9.21→$2.81, 10→0 errors) by adding Insforge Skills + CLI as a context-engineering layer. Repo: github.com/InsForge/InsForge (open-source, local).', topics: ["claude-code", "prompting", "agent-design"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '284.8K', notes: '', enriched: true, content: '' },
  { id: 'post-49', date: '2026-04-21', author: 'Shubham Saboo', handle: '@saboo_shubham_', subject: 'Post by Shubham Saboo on X', url: 'https://x.com/saboo_shubham_/status/2046473615118672325', summary: 'Shares agentic-stack — \'One brain, many harnesses. Portable .agent/ folder (memory + skills)\' — a pattern for sharing a single memory/skill store across multiple agent harnesses. Repo: github.com/codejunkie99/agentic-stack.', topics: ["agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '3,249', notes: '', enriched: true, content: 'GitHub Repo: codejunkie99/agentic-stack. One brain, many harnesses. Portable .agent/ folder (memory + skills)' },
  { id: 'post-50', date: '2026-04-21', author: 'Tech with Mak', handle: '@technmak', subject: 'Post by Tech with Mak on X', url: 'https://x.com/technmak/status/2046414820241760620', summary: 'Summary of Meta\'s REFRAG paper: compresses retrieved RAG chunks into single embeddings (16,384 tokens → 1,024 chunk embeddings), delivering 30.85x faster time-to-first-token, zero perplexity loss, 16x context extension (4K → 64K), and 3.75x better than prior SOTA. Exploits sparse attention patterns in RAG contexts via precomputable embeddings and RL-based compression policy.', topics: ["research", "agent-design", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Meta REFRAG: 30x faster RAG via chunk embedding compression, zero accuracy loss, 16x context extension' },
  { id: 'post-51', date: '2026-04-21', author: 'Aakash Gupta', handle: '@aakashgupta', subject: 'Post by Aakash Gupta on X — feels like correspondence', url: 'https://x.com/aakashgupta/status/2046371351016161745', summary: 'Essay arguing Yann LeCun left Meta because Zuck wouldn\'t bet the company on JEPA, then his group shipped the first end-to-end JEPA trained from raw pixels — 15M parameters, single GPU, a few hours. Frames it as a Xerox PARC pattern: Meta had the architecture, dissolved the robotics team, and let the breakthrough walk out the door while humanoid robotics competitors (Figure AI, Tesla Optimus, World Labs) burn capital on expensive foundation-model pipelines. Jeremy flagged \'feels like correspondence\' (thoughtful essay style).', topics: ["industry", "research"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '66.1K', notes: 'Jeremy modified subject: \'feels like correspondence\'', enriched: true, content: 'LeCun\'s post-Meta JEPA breakthrough: 15M params, single GPU, end-to-end from raw pixels' },
  { id: 'post-52', date: '2026-04-21', author: 'Tom Dörr', handle: '@tom_doerr', subject: 'Post by Tom Dörr on X', url: 'https://x.com/tom_doerr/status/2046369616411185635', summary: 'Recursive self-improving agent harness — a tool that lets an agent iterate on its own harness/context. Repo: github.com/greyhaven-ai/autocontext. Short announcement-style post.', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '7,189', notes: '', enriched: true, content: 'Recursive self-improving agent harness github.com/greyhaven-ai/autocontext' },
  { id: 'post-53', date: '2026-04-21', author: 'Sydney Runkle', handle: '@sydneyrunkle', subject: 'Post by Sydney Runkle on X', url: 'https://x.com/sydneyrunkle/status/2046277232537256002', summary: 'LangChain team piece on \'The runtime behind production deep agents\' — distinguishing the harness (prompts, tools, skills, model loop) from the runtime (durable execution, memory, multi-tenancy, observability). Walks through production requirements for agents and how LangSmith Deployment + Agent Server package those capabilities. Reference architecture for shipping agents in production.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '118K', notes: '', enriched: true, content: 'LangChain: harness vs runtime for production deep agents — durable execution, memory, multi-tenancy, observability via LangSmith Deployment' },
  { id: 'post-54', date: '2026-04-21', author: 'Nav Toor', handle: '@heynavtoor', subject: 'Post by Nav Toor on X', url: 'https://x.com/heynavtoor/status/2046276160930414976', summary: 'Intro to PoisonedRAG attack: researchers showed 5 malicious documents planted in a 2.6M-document corpus can hijack an LLM\'s answer 97% of the time. Attacker never touches the model or retriever — just writes documents. Important RAG security consideration.', topics: ["research", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '31.6K', notes: '', enriched: true, content: 'PoisonedRAG: 5 docs in 2.6M-doc corpus can hijack LLM answers 97% of the time without touching model or retriever' },
  { id: 'post-55', date: '2026-04-21', author: 'Simplifying AI', handle: '@simplifyinai', subject: 'Post by Simplifying AI on X', url: 'https://x.com/simplifyinai/status/2046271932035645599', summary: 'Summary of Microsoft\'s MEMENTO paper: instead of growing the KV cache to fit long reasoning chains, train the model to break reasoning into blocks and emit dense compressed \'memento\' summaries between them, then drop the raw tokens. Framed as \'the secret isn\'t remembering everything — it\'s knowing what to forget.\' Engagement-farming tone but real underlying paper.', topics: ["research", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '31.6K', notes: '', enriched: true, content: 'Microsoft MEMENTO: compress reasoning chains into summaries mid-inference to control KV cache growth' },
  { id: 'post-56', date: '2026-04-21', author: 'Sigrid Jin', handle: '@realsigridjin', subject: 'Post by Sigrid Jin on X (worth extracting a skill)', url: 'https://x.com/realsigridjin/status/2046266374948069387', summary: 'Quote-tweet of Junghwan Na\'s writeup — Na got his GitHub banned after pushing 500+ commits across 100+ open-source repos in 72 hours using an AI harness. Sigrid pulls out the two highest-leverage principles from Na\'s method: (1) reproduce the bug locally or drop it, (2) read merge history instead of CONTRIBUTING.md. Jeremy flagged \'worth extracting a skill\' — these are skill-worthy contribution-harness patterns.', topics: ["agent-design", "skills-mcp", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '163K', notes: 'Jeremy modified subject: \'worth extracting a skill\'', enriched: true, content: 'Junghwan Na\'s AI harness got him banned after 500+ commits in 72h. Two principles: reproduce bug locally or drop it; read merge history not CONTRIBUTING.md' },
  { id: 'post-57', date: '2026-04-21', author: 'Raymond Weitekamp', handle: '@raw_works', subject: 'Post by Raymond Weitekamp on X', url: 'https://x.com/raw_works/status/2046240194999755153', summary: 'Thoughtful long-form post on Recursive Language Models (RLMs) — \'the new reasoning models.\' RLMs collapse reasoning and tool use into one abstraction: the model treats its own prompt as an environment it can inspect, slice, and recursively query via a REPL. Input size is no longer a hard ceiling; results show processing up to 2 orders of magnitude beyond base model\'s context, outperforming long-context scaffolds on four long-context tasks.', topics: ["research", "agent-design", "prompting"], audience: ["me", "dev-team", "leadership"], priority: 'long-term', sourceType: 'tweet', views: '49K', notes: '', enriched: true, content: 'RLMs: recursive language models treat prompt as REPL environment, marrying reasoning and tool use' },
  { id: 'post-58', date: '2026-04-21', author: 'Ihtesham Ali', handle: '@ihtesham2005', subject: 'Post by Ihtesham Ali on X (important for planner?)', url: 'https://x.com/ihtesham2005/status/2046197374855582157', summary: 'Writeup of George Pólya\'s 1945 book \'How to Solve It\' — the four-step problem-solving framework (understand, plan, execute, look back). Central heuristic: if you can\'t solve the proposed problem, solve a simpler related one first. Jeremy\'s note \'important for planner?\' — relevant for AI agent planning/decomposition patterns.', topics: ["prompting", "agent-design", "management"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Jeremy modified subject: \'important for planner?\'', enriched: true, content: 'Pólya\'s How to Solve It 4-step framework: understand, plan (simpler related problem), execute, look back' },
  { id: 'post-59', date: '2026-04-21', author: 'Vox', handle: '@voxyz_ai', subject: 'Post by Vox on X', url: 'https://x.com/voxyz_ai/status/2045899539526148193', summary: 'The #1 GitHub trending repo this week (44,465 stars) is a CLAUDE.md file distilling Andrej Karpathy\'s LLM coding pitfalls into 4 principles: (1) think before coding — ask when unsure, (2) simplicity first — minimum code, (3) surgical edits — only touch what\'s required, (4) goal-driven — translate fuzzy instructions into verifiable targets. Directly actionable as a CLAUDE.md system prompt.', topics: ["claude-code", "prompting", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '824.4K', notes: '', enriched: true, content: '#1 GitHub trending repo: CLAUDE.md distilling Karpathy\'s 4 LLM coding principles — think before coding, simplicity, surgical edits, goal-driven' },
  { id: 'post-60', date: '2026-04-20', author: 'Akshay', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2046151867177308181', summary: 'Summary of a Google DeepMind paper on \'AI Agent Traps\' — first systematic framework for adversarial content engineered to hijack web-browsing agents. Six attack surfaces: (1) content injection (invisible CSS/HTML, steganography — 86% hijack in one study), (2) semantic manipulation via framing/priming, (3) cognitive state poisoning of RAG/long-term memory (>80% success with <0.1% poisoning), plus more. Training-time defenses can\'t fix an inference-time problem. References Strix (github.com/usestrix/strix) — open-source red-team agent, 24k stars, Apache 2.0 — for automated pentesting of web apps.', topics: ["agent-design", "research", "dev-practices"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '29.5K', notes: '', enriched: true, content: '' },
  { id: 'post-61', date: '2026-04-20', author: 'Kenneth Auchenberg', handle: '@auchenberg', subject: 'Post by Kenneth Auchenberg 🛠 on X', url: 'https://x.com/auchenberg/status/2045940742678368570', summary: 'Short quote-tweet on Aparna Dhinakaran\'s article \'Sandboxes Are the Servers of the Harness Era\' — Auchenberg frames swarms/multi-agent systems as \'harnesses managing harnesses.\' The cited piece argues the harness is the application and the sandbox is the server (compute, filesystem, persistent state).', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '6,816', notes: '', enriched: true, content: '' },
  { id: 'post-62', date: '2026-04-20', author: '阿绎 AYi', handle: '@ayi_ainotes', subject: 'Post by 阿绎 AYi on X', url: 'https://x.com/ayi_ainotes/status/2045874192155824616', summary: 'Thread (translated from Chinese) hyping an open-source project \'OpenMythos\' by a 22-year-old claimed to reverse-engineer Anthropic\'s Claude as a \'recurrent deep Transformer\' — same weights loop through 16 forward passes, with thinking happening silently in hidden space instead of visible CoT tokens. Claims a 770B-param recurrent model matches a 1.3T plain model. Speculative architecture claim; treat as unverified.', topics: ["research", "claude-code", "questionable"], audience: ["me", "dev-team"], priority: 'long-term', sourceType: 'tweet', views: '410.6K', notes: '', enriched: true, content: '' },
  { id: 'post-63', date: '2026-04-19', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2045427057656729985', summary: 'Launch of GBrain v0.11 with \'Minions\' — a BullMQ-based queue/jobs system running on GBrain\'s Postgres/PGLite, built to replace OpenClaw\'s subagents that kept timing out. Tan claims Minions are 10x faster and more reliable for OpenClaw/GBrain agent setups.', topics: ["agent-design", "dev-practices", "industry"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '226.4K', notes: '', enriched: true, content: '' },
  { id: 'post-64', date: '2026-04-18', author: 'Akshay', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2045404494641733962', summary: 'Summary of UCL paper \'Dive into Claude Code\' (arXiv:2604.14228) reverse-engineering the leaked Claude Code source. Only 1.6% of the codebase is AI decision logic; 98.4% is operational infrastructure — permission gates, tool routing, context compaction, recovery logic, session persistence. Core loop is a simple while-true (call model, run tools, repeat). Permission system has 7 modes plus an ML classifier. Contrasts with LangGraph\'s explicit state machines and Devin\'s heavy planners — Claude Code invests engineering effort in the harness while giving the model maximum decision latitude. Punchline: the harness is the differentiator, not the model.', topics: ["agent-design", "claude-code", "research"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '157.1K', notes: '', enriched: true, content: '' },
  { id: 'post-65', date: '2026-04-18', author: 'Alex Ker', handle: '@thealexker', subject: 'Post by Alex Ker 🔭 on X', url: 'https://x.com/thealexker/status/2045203785304232162', summary: 'Guide on optimizing your agent harness. Three levers: (1) keep config files lean enough for the model to reason over, (2) structure prompts with the R.P.I. framework so the model approaches problems like a staff engineer, (3) use subagents to keep the main context window clean. Ker contributes to Roo Code, DeepAgent CLI, and HumanLayer. Core argument: harnesses that compound output vs. harnesses that compound mistakes — judgment lives at the harness layer.', topics: ["agent-design", "prompting", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '100K', notes: '', enriched: true, content: '' },
  { id: 'post-66', date: '2026-04-18', author: 'Daniel Miessler', handle: '@danielmiessler', subject: 'Post by ᴅᴀɴɪᴇʟ ᴍɪᴇssʟᴇʀ 🛡️ on X', url: 'https://x.com/danielmiessler/status/2045148852047827449', summary: 'Miessler endorses \'Interceptor\' by @ronaldeddings as the best Browser Control System he\'s used for agents (out of 100+ tools). He says it\'s added the most value to his PAI (Personal AI) harness recently. Short recommendation tweet — no link in the post body but the tool is attributed to Ronald Eddings.', topics: ["agent-design", "claude-code"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '16.6K', notes: '', enriched: true, content: '' },
  { id: 'post-67', date: '2026-04-18', author: 'Kevin Simback', handle: '@ksimback', subject: 'Post by Kevin Simback 🍷 on X', url: 'https://x.com/ksimback/status/2045120939680038923', summary: 'Self-quote-tweet pointing back to Simback\'s Apr 16 article \'The AI Agent Moat Is Real, but Narrower Than You Think.\' Thesis: moats in the agent space aren\'t in the harness itself. Simback has been looking at where to invest and build in agents over four months and is narrowing his view of where defensibility actually lives.', topics: ["agent-design", "industry", "management"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '424', notes: '', enriched: true, content: '' },
  { id: 'post-68', date: '2026-04-18', author: 'PolyArb', handle: '@usepolyarb', subject: 'Post by PolyArb on X', url: 'https://x.com/usepolyarb/status/2045109166599963026', summary: 'Prediction-markets arbitrage infrastructure launch — not AI-focused. Six years of derivatives execution (FX arb → crypto perps → prop trading); now targeting prediction markets ($44B in 2025, projected $1T by 2027). Technical breakdown of multi-venue arb, unified oracle, and execution engine. Included because it landed in Jeremy\'s link stream.', topics: ["industry", "general"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '219K', notes: '', enriched: true, content: '' },
  { id: 'post-69', date: '2026-04-18', author: 'Eric Hartford', handle: '@quixiai', subject: 'Post by Eric Hartford on X', url: 'https://x.com/quixiai/status/2044952124568527298', summary: 'Response to Anthropic\'s Project Glasswing / Claude Mythos Preview announcement, where Anthropic claimed the model was too dangerous to release after finding thousands of zero-days (27-year-old OpenBSD bug, 16-year-old FFmpeg bug). Hartford argues the real innovation is the workflow, not the model: rank every file by attack surface, fan out hundreds of parallel agents each scoped to one file, use crash oracles (AddressSanitizer, UBSan) as ground truth. He open-sourced \'Clearwing\' (MIT licensed) at github.com/Lazarus-AI/clearwing — Qwen3.5 finetuned to Western alignment — so defenders don\'t have to wait for access to a gated model.', topics: ["research", "agent-design", "industry"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: '' },
  { id: 'post-70', date: '2026-04-17', author: 'Alter Ego', handle: '@alterego_eth', subject: 'Post by Alter Ego on X', url: 'https://x.com/alterego_eth/status/2045093809886020058', summary: 'Promo for Hermes Agent from Nous Research (team behind YaRN, Nomos, Psyche) — open, self-hosted agent pitched as a new standard for AI trading on Polymarket. Features: self-learns by writing itself skills after complex tasks, persistent memory (MEMORY.md + USER.md + SQLite), runs 24/7 on a VPS with Telegram alerts, closed learning loop that analyzes and improves every ~15 tool calls. Contrasted with \'static\' OpenClaw. Example given: a weather-bot turned EV+Kelly Criterion trader scanning 20 cities.', topics: ["agent-design", "skills-mcp"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: '' },
  { id: 'post-71', date: '2026-04-17', author: '0xSero', handle: '@0xSero', subject: 'Post by 0xSero on X', url: 'https://x.com/0xsero/status/2044879665001595263', summary: '0xSero (quote-tweeting Sarah Chieng\'s article \'Single-agent AI coding is a nightmare for engineers\') says he\'s gone 180 on multi-agents/subagents after analyzing hundreds of AI coding agent sessions — they actually help a lot. Practitioner\'s change-of-mind about orchestration.', topics: ["agent-design", "claude-code", "management"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '103.6K', notes: '', enriched: true, content: 'Multi-agents and subagents: changed mind after analyzing hundreds of AI coding agent sessions — actually helps a lot. Quote-tweeting Sarah Chieng\'s article: Single-agent AI coding is a nightmare for engineers' },
  { id: 'post-72', date: '2026-04-17', author: 'Hamudi', handle: '@hamudinaanaa', subject: 'Post by Hamudi on X', url: 'https://x.com/hamudinaanaa/status/2044872907072164304', summary: 'Quote-tweet on Sequoia\'s $1T \'sell work, not software\' thesis. Hamudi announces a paper on measuring economic outcomes from AI agents — \'Outcome Primitives.\' Tracked 1,300 agents over 21 days generating $32M of economic value: jobs secured, $200k grants won, e-commerce shops shipped. Framing: copilots compete on software margins (losing to labs), outcome-delivery products compete on services margins (transforming industries).', topics: ["industry", "management", "agent-design"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: '' },
  { id: 'post-73', date: '2026-04-15', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2044479509874020852', summary: 'X article: "Resolvers: The Routing Table for Intelligence" — argues resolvers (context-routing rules: when task X appears, load document Y first) are the most important but invisible component of agent systems. Follows up on "Thin Harness, Fat Skills" framework. 21K views.', topics: ["agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'article', views: '21K', notes: '', enriched: true, content: 'Resolvers: The Routing Table for Intelligence. A resolver is a routing table for context. When task type X appears, load document Y first. That\'s it. One sentence. But that one sentence is the difference between an agent that compounds intelligence vs one that starts from scratch every time. Built on the Thin Harness, Fat Skills framework introduced previously.' },
  { id: 'post-74', date: '2026-04-15', author: 'GitHub Projects Community', handle: '@GithubProjects', subject: 'Post by GitHub Projects Community on X', url: 'https://x.com/githubprojects/status/2044453433743458686', summary: 'Promotes Graphify — a tool to turn any folder of code into a queryable knowledge graph instantly. Useful for codebase exploration and RAG-style queries. osp.fyi/graphify', topics: ["dev-practices", "agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '5,935', notes: '', enriched: true, content: 'Turn any folder of code into a queryable knowledge graph instantly. https://osp.fyi/graphify' },
  { id: 'post-75', date: '2026-04-15', author: 'Yoonho Lee', handle: '@yoonholeee', subject: 'Post by Yoonho Lee on X', url: 'https://x.com/yoonholeee/status/2044442372864700510', summary: 'Released code for Meta-Harness — a method to autonomously improve LLM evaluation harnesses on problems humans are actively working on, solving long-horizon credit assignment over code, traces, and scores. Repo at github.com/stanford-iris-lab/meta-harness with ONBOARDING.md for agent-guided setup.', topics: ["research", "agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '35.2K', notes: '', enriched: true, content: 'We just released code for Meta-Harness! https://github.com/stanford-iris-lab/meta-harness. Aside from replicating paper experiments, the repo is designed to help users implement good Meta-Harnesses in completely new domains! Just point your agent at ONBOARDING.md and have a conversation. How can we autonomously improve LLM harnesses on problems humans are actively working on? Doing so requires solving a hard, long-horizon credit-assignment problem over all prior code, traces, and scores.' },
  { id: 'post-76', date: '2026-04-15', author: 'Viv', handle: '@Vtrivedy10', subject: 'Post by Viv on X', url: 'https://x.com/vtrivedy10/status/2044430694458310870', summary: 'Points to Hunter Leath\'s article "Bash is the SQL for file systems" — a deep dive on storage, filesystems, and egress fees from cloud providers. Framed as must-read alpha for anyone working at the storage/filesystem layer.', topics: ["dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '12.5K', notes: '', enriched: true, content: 'X is a crazy place because there\'ll be builders at the frontier of their domain just openly sharing stuff on X…and you can just ask them questions, learn, disagree, etc. Hunter\'s that for storage/filesystems, go scroll his profile and read the last few articles for alpha and fire mental models. Quoting Hunter Leath @jhleath: Bash is the SQL for file systems. Article about egress fees and cloud storage architecture.' },
  { id: 'post-77', date: '2026-04-15', author: 'Shann³', handle: '@shannholmberg', subject: 'Post by Shann³ on X', url: 'https://x.com/shannholmberg/status/2044413638388363272', summary: 'Built a 230-page Obsidian knowledge base (tweets, bookmarks, articles, notes) and connected it to every AI agent project using qmd (Tobi Lütke\'s tool) with hybrid BM25+vector search and LLM re-ranking. Any agent in any project now searches this global wiki before brainstorming or planning.', topics: ["agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '—', notes: '', enriched: true, content: 'I connected my knowledge base to every project I work on. every agent reads my wiki before doing anything. I built a knowledge base in obsidian with 230+ pages. my tweets, bookmarks, articles, ideas, notes, all compiled into structured wiki pages with cross-references. The knowledge only worked when I was inside that folder. So I set up qmd (by tobi lutke) to index the wiki. hybrid BM25 + vector search with LLM re-ranking, runs locally. Then I wrote a global skill that any agent in any project can call.' },
  { id: 'post-78', date: '2026-04-15', author: 'Millie Marconi', handle: '@MillieMarconnni', subject: 'Post by Millie Marconi on X', url: 'https://x.com/milliemarconnni/status/2044358003714097601', summary: 'Uses Claude as a full inversion engine running Charlie Munger\'s method — mapping every path to failure to make the path to success obvious by elimination. Shares 5 prompts for applying systematic inversion to any problem.', topics: ["prompting", "claude-code"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '37.3K', notes: '', enriched: true, content: 'Inversion is the most powerful thinking tool most people never use correctly. They invert the goal. They don\'t invert the system. I turned Claude into a full inversion engine that runs Charlie Munger\'s method on any problem mapping every path to failure so precisely that the path to success becomes obvious by elimination. Here are the 5 prompts:' },
  { id: 'post-79', date: '2026-04-15', author: 'Akshay', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2044329897603244093', summary: 'Akshay argues agent memory is three-dimensional, not just vector. Example: \'Was Alice\'s project affected by Tuesday\'s outage?\' — vector search finds Alice + Tuesday facts but misses the bridging Project-Atlas-uses-PostgreSQL fact. Proper stack needs relational (provenance), vector (semantic), and graph (relationships) stores. Any multi-hop business question breaks flat retrieval.', topics: ["agent-design", "research"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '53.5K', notes: '', enriched: true, content: '' },
  { id: 'post-80', date: '2026-04-15', author: 'Europurr', handle: '@vrloom', subject: 'Post by Europurr on X', url: 'https://x.com/vrloom/status/2044314974101877175', summary: 'Europurr switched from \'OpenClaw\' to Hermes and is setting up Hindsight memory (@NousResearch) — says it\'s light-years ahead. Signal about Nous Research\'s memory/agent stack being viable alternative.', topics: ["agent-design", "claude-code"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '19.7K', notes: '', enriched: true, content: '' },
  { id: 'post-81', date: '2026-04-15', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2044291663213015491', summary: 'Garry Tan releases GBrain v0.10.0 — his personal \'OpenClaw\' setup with RESOLVER.md, SOUL.md and ACLs for multi-user brain access. 24 distinct \'fat skills\' with e2e tests, evals and unit tests.', topics: ["claude-code", "skills-mcp", "agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '85.1K', notes: '', enriched: true, content: '' },
  { id: 'post-82', date: '2026-04-15', author: 'Shaw (spirit/acc)', handle: '@shawmakesmagic', subject: 'Post by Shaw (spirit/acc) on X', url: 'https://x.com/shawmakesmagic/status/2044269097647779990', summary: 'Shaw (@shawmakesmagic) shares an 8-subagent codebase-cleanup prompt: (1) dedup/DRY, (2) consolidate shared type definitions, (3) find/remove unused code via knip, (4) untangle circular deps via madge, (5) replace weak types (any/unknown) with strong ones, (6) remove unnecessary try/catch defensive programming, plus two more. Practical agent-orchestration pattern for quality cleanup.', topics: ["claude-code", "agent-design", "dev-practices", "prompting"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '335.7K', notes: '', enriched: true, content: '' },
  { id: 'post-83', date: '2026-04-15', author: 'Erick', handle: '@ericksky', subject: 'Post by Erick on X', url: 'https://x.com/ericksky/status/2044225008419922270', summary: '[Post unavailable — login wall or deleted]', topics: ["general"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: '' },
  { id: 'post-84', date: '2026-04-15', author: 'mr-r0b0t', handle: '@mr_r0b0t', subject: 'Post by mr-r0b0t on X', url: 'https://x.com/mr_r0b0t/status/2044199154004472009', summary: 'Amplifies a tip on a 3-tool agent web stack: SearXNG for candidate source discovery, Firecrawl for known-URL scraping, Camofox for JS/interaction browser fallback. Described as essential for any agent doing web search or scraping.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '2,600', notes: '', enriched: true, content: 'This is an amazingly informative post if you\'re running agents that are doing web search/scraping! That\'s basically everyone! Definitely worth the read and the infographic is 11/10! Quoting Ahmad @TheAhmadOsman: PRO TIP My Agent Web Stack - SearXNG: candidate source discovery - Firecrawl: known-URL scrape and crawl - Camofox: browser fallback for JS/interaction. Search -> Extract -> Interact' },
  { id: 'post-85', date: '2026-04-15', author: 'klöss', handle: '@kloss_xyz', subject: 'Post by klöss on X', url: 'https://x.com/kloss_xyz/status/2044169678961234282', summary: 'klöss proposes a 4-folder repo layout to stop agents hallucinating context: /audits (proof/verify), /docs (description/describe), /plans (intent/plan), /specs (law/enforce). Separate intent from proof from law from descriptions and Claude Code / Codex / Cursor agents stop guessing what files mean.', topics: ["claude-code", "dev-practices", "prompting"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '12.7K', notes: '', enriched: true, content: '' },
  { id: 'post-86', date: '2026-04-15', author: '0xSero', handle: '@0xSero', subject: 'Post by 0xSero on X', url: 'https://x.com/0xsero/status/2044165332928213243', summary: 'Guide to running large LLMs on limited hardware: use REAPs (50% savings), quantization (AWQ/GPTQ/W4A16/FP8 for fast inference; GGUF/EXL3 for compatibility; MLX for Apple silicon), and 8-bit KV cache (50-75% savings). Practical tips for local AI deployment.', topics: ["research", "dev-practices"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '12.1K', notes: '', enriched: true, content: 'Guide to running BIG B0Is on your small hardware. 1. Use REAPs: up to 50% savings. 2. Use quantisations: 75% savings - AWQ / GPTQ / W4A16 / FP8 = FAST inference - GGUF / EXL3 = Slow but just works - MLX = Best for apple. 3. Use 8bit KV cache: 50-75% savings.' },
  { id: 'post-87', date: '2026-04-15', author: 'Paul Bakaus', handle: '@pbakaus', subject: 'Post by Paul Bakaus on X', url: 'https://x.com/pbakaus/status/2044118871326765541', summary: 'Paul Bakaus endorses Matthew Sims (@mbwsims) who is building in the open at the intersection of creativity, storytelling and AI (English PhD + ML/startup background). Quotes Matt\'s post on teaching Claude Code to think systematically — tired of repeating the same security/testing/pattern-review prompts with inconsistent answers.', topics: ["claude-code", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '13.5K', notes: '', enriched: true, content: '' },

  { id: 'post-92', date: '2026-04-15', author: 'Ihtesham Ali', handle: '@ihtesham2005', subject: 'Post by Ihtesham Ali on X', url: 'https://x.com/ihtesham2005/status/2044056849272705246', summary: 'Aurogen — MIT-licensed \'OpenClaw\' fork with true multi-agent, multi-instance orchestration in one deployment (github.com/UniRound-Tec/Aurogen). Modular agents/channels/providers/skills, web-panel setup (no config/CLI), ClaWHub integration, one-click installers, $50 Linux SBC minimum.', topics: ["agent-design", "claude-code", "skills-mcp"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '5.5K', notes: '', enriched: true, content: '' },
  { id: 'post-93', date: '2026-04-15', author: 'Amir Salihefendić', handle: '@amix3k', subject: 'Post by Amir Salihefendić on X', url: 'https://x.com/amix3k/status/2044046057315742146', summary: 'Amir Salihefendić (Doist/Todoist founder) on org design when companies include both human and machine intelligence. Riffs on Jack Dorsey\'s framing and Terence Tao\'s \'Copernican view of intelligence\' — humans and machines have different strengths, not just different rungs on the same ladder. AI\'s role is connective tissue: context, trade-offs, cross-team information flow.', topics: ["management", "industry"], audience: ["me", "leadership"], priority: 'long-term', sourceType: 'tweet', views: '21.5K', notes: '', enriched: true, content: '' },
