  { id: 'post-241', date: '2026-03-02', author: 'vixhaℓ', handle: '@TheVixhal', subject: 'Post by vixhaℓ on X', url: 'https://x.com/thevixhal/status/2027763453679841311', summary: 'Step-by-step X article on building a 16-bit CPU from scratch in C. Over 4,000 bookmarks. Educational deep-dive into computer architecture fundamentals.', topics: ["dev-practices"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '159.6K', notes: 'Educational — not AI-specific but solid CS fundamentals content', enriched: true, content: '' },
  { id: 'post-242', date: '2026-03-01', author: 'AVB', handle: '@neural_avb', subject: 'Post by AVB on X', url: 'https://x.com/neural_avb/status/2027957534159835443', summary: 'Wrote down all the things I have learned over the past couple years developing LLM agents. I just follow one very simple mental model and it kinda just works... (atleast for me)', topics: ["agent-design", "research"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '4K', notes: '', enriched: true, content: '' },
  { id: 'post-243', date: '2026-03-01', author: 'Joseph Thacker', handle: '@rez0__', subject: 'Post by Joseph Thacker on X', url: 'https://x.com/rez0__/status/2027448137133264955', summary: 'Bug bounty hunting transformed by AI coding agents since December 2025. Author pointed Claude Code at a new program\'s scope — enumerate subdomains, grab JS bundles, run full analysis pipeline, fuzz paths, spider authenticated surface, check for IDORs, test GraphQL. Models now have enough coherence and tenacity to power through long hacking tasks autonomously.', topics: ["agent-design", "claude-code", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Concrete example of Claude Code being used for autonomous security research — impressive real-world agent use case', enriched: true, content: '' },
  { id: 'post-244', date: '2026-02-28', author: 'Thariq', handle: '@trq212', subject: 'Post by Thariq on X', url: 'https://x.com/trq212/status/2027463795355095314', summary: 'Anthropic engineer shares lessons from building Claude Code — focuses on action space design for agents. Explores tradeoffs between few general tools (bash, code execution) vs many specialized ones. Uses the analogy of solving a math problem: paper vs calculator vs Wolfram Alpha. Key insight: tool design shapes agent capability more than model capability alone.', topics: ["claude-code", "agent-design", "prompting"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '3.7M', notes: 'From Anthropic engineer — 3.7M views. Essential reading on agent tool design philosophy behind Claude Code.', enriched: true, content: '' },
  { id: 'post-245', date: '2026-02-27', author: 'Sudo su', handle: '@sudoingX', subject: 'Post by Sudo su on X', url: 'https://x.com/sudoingx/status/2027264446989848613', summary: 'Practical tips for steering AI coding agents: tell the model its own architecture constraints, provide project structure over single prompts, iterate in layers (scaffold → refine → polish), let the agent debug itself, and leverage long context (262K tokens). Mentions Claude Code as the preferred harness and Qwen3.5\'s 256-expert MoE architecture.', topics: ["prompting", "agent-design", "claude-code"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: '' },
  { id: 'post-246', date: '2026-02-27', author: 'SightBringer', handle: '@_The_Prophet__', subject: 'Post by SightBringer on X', url: 'https://x.com/_the_prophet__/status/2027235489930191056', summary: 'Provocative critique of auto-memory in AI tools: argues it\'s a power grab disguised as convenience. The vendor captures your patterns, defaults, priorities, and blind spots. But concedes that if done right with user control, stateful memory is powerful. Spiral: feeling known → lowered guard → outsource more → dependency.', topics: ["agent-design", "management"], audience: ["me", "leadership"], priority: 'long-term', sourceType: 'tweet', views: '', notes: 'Interesting counterpoint on AI memory features — worth considering for our own tool adoption strategy', enriched: true, content: '' },
  { id: 'post-247', date: '2026-02-27', author: 'Brian Roemmele', handle: '@brianroemmele', subject: 'Post by Brian Roemmele on X', url: 'https://x.com/BrianRoemmele/status/2027169646485729698', summary: 'DeepMind\'s "Intelligent AI Delegation" Paper Is the Exact Operating System We\'ve Been Running in Production at Zero-Human Company @ Home Since January 2026 Google DeepMind dropped a bombshell on February 12, 2026: the 42-page paper "Intelligent AI Delegation".', topics: ["research", "industry"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '507K', notes: '', enriched: true, content: '' },
  { id: 'post-248', date: '2026-02-27', author: 'Kirk Borne', handle: '@kirkdborne', subject: 'Post by Kirk Borne on X', url: 'https://x.com/KirkDBorne/status/2027031353849852309', summary: '"Agentic Design Patterns: A Hands-On Guide to Building Intelligent Systems" Read the Online eBook from Google at docs.google.com/document/d/1rs… ...', topics: ["agent-design"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '103K', notes: '', enriched: true, content: '' },
  { id: 'post-249', date: '2026-02-27', author: 'George', handle: '@nurijanian', subject: 'Post by George from 🕹prodmgmt.world on X', url: 'https://x.com/nurijanian/status/2027020091418890613', summary: 'Three-tier PM documentation framework: 1-pagers (decision docs, not specs), 3-pagers (validation + alignment with user stories and wireframes), and full PRDs (implementation specs with edge cases). Write 10 one-pagers, 3 get approved to become 3-pagers, best becomes PRD. Avoids wasting time on detailed specs for ideas that get killed.', topics: ["management"], audience: ["me", "leadership"], priority: 'long-term', sourceType: 'tweet', views: '', notes: 'Not AI-specific but solid product management process', enriched: true, content: '' },
  { id: 'post-250', date: '2026-02-27', author: 'Avi Chawla', handle: '@_avichawla', subject: 'Post by Avi Chawla on X', url: 'https://x.com/_avichawla/status/2026907616337883612', summary: 'Connects the 37-year-old \'confused deputy problem\' (Norm Hardy, 1988) to modern AI agent security. Agents with legitimate access get tricked into misusing it — technically authorized actions with unauthorized intent. Now relevant as agents get access to production DBs, APIs, email, and cloud infrastructure.', topics: ["agent-design", "research"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Good framing of AI agent security through a classic CS security lens', enriched: true, content: '' },
  { id: 'post-251', date: '2026-02-27', author: 'Fernando', handle: '@Franc0Fernand0', subject: 'Post by Fernando on X', url: 'https://x.com/franc0fernand0/status/2026701684106313791', summary: 'Shares a Microsoft study on traits of great tech managers. Technical skills are necessary but not sufficient — availability, giving autonomy, supporting experimentation, and setting clear processes matter more. Links to the Kalliamvakou TSE 2018 paper.', topics: ["management"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '83.9K', notes: 'Links to academic paper: thomas-zimmermann.com/publications/files/kalliamvakou-tse-2018.pdf', enriched: true, content: '' },
  { id: 'post-252', date: '2026-02-27', author: 'Machina', handle: '@EXM7777', subject: 'Post by Machina on X', url: 'https://x.com/exm7777/status/2026666140987175221', summary: 'Claims to teach how to permanently change how AI thinks via custom skills for Claude, Codex, or OpenClaw. X article format. Self-promotional content about building personalized AI skills/frameworks.', topics: ["questionable", "prompting"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '64.2K', notes: 'Engagement farming (\'ONLY skill you will ever need\', \'change your life\'). Underlying content is about custom skill creation.', enriched: true, content: '' },
  { id: 'post-253', date: '2026-02-27', author: 'Sukh Sroay', handle: '@sukh_saroy', subject: 'Post by Sukh Sroay on X', url: 'https://x.com/sukh_saroy/status/2026624254800965848', summary: 'PageIndex — a RAG system that replaces vector search with hierarchical tree indexing inspired by AlphaGo. Builds a smart table-of-contents tree from documents and uses LLM reasoning to traverse it. Scored 98.7% on FinanceBench. No vector DB, no chunking, traceable retrieval. Works on PDFs, markdown, raw page images. 11.6K GitHub stars.', topics: ["questionable", "research", "agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Engagement farming format (BREAKING) but PageIndex is a real project with strong benchmark results — alternative to vector RAG', enriched: true, content: '' },
  { id: 'post-254', date: '2026-02-25', author: 'Atlas Forge', handle: '@AtlasForgeAI', subject: 'Post by Atlas Forge on X', url: 'https://x.com/atlasforgeai/status/2026380335249002843', summary: 'Describes 9 meta-learning loops for AI coding agents to retain knowledge across sessions. Core problem: agents are smart within sessions but stupid across them — every context reset wipes learned behaviors. Fix is structural feedback loops in agent files: regressions become guardrails, predictions become calibration, friction becomes signal. Start with a regressions list.', topics: ["agent-design", "prompting"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '162K', notes: 'X article — directly applicable to how we structure CLAUDE.md and agent memory', enriched: true, content: '' },
  { id: 'post-255', date: '2026-02-25', author: 'Aakash Gupta', handle: '@aakashgupta', subject: 'Post by Aakash Gupta on X', url: 'https://x.com/aakashgupta/status/2026367615602667784', summary: 'Riffs on Karpathy\'s insight: the new distribution channel for software is agents, not humans. Agents call your CLI, hit your MCP server, read your docs programmatically. MCP went from zero to 97M monthly SDK downloads in 12 months with 10K+ active servers. OpenAI, Google, Microsoft all adopted it. Anthropic donated MCP to Linux Foundation. Running an MCP server is now like running a web server.', topics: ["skills-mcp", "industry", "agent-design"], audience: ["me", "dev-team", "leadership"], priority: 'now', sourceType: 'tweet', views: '', notes: 'X article — strong case for MCP as the new API surface. 85% of enterprises expected to have AI agents deployed.', enriched: true, content: '' },
  { id: 'post-256', date: '2026-02-25', author: 'Rohit', handle: '@rohit4verse', subject: 'Post by Rohit on X', url: 'https://x.com/rohit4verse/status/2026359771427991764', summary: '10-step checklist for taking agentic AI projects to production: boundaries/threat models, strict I/O schemas, role-based access + sandboxing, layered context windows, governed knowledge grounding, planning/orchestration control flow, built-in memory, native retry/error handling, full observability, and safety gates with drift detection. Claims 40%+ of agentic projects fail due to poor architecture.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Good production readiness checklist for agent systems', enriched: true, content: '' },
  { id: 'post-257', date: '2026-02-25', author: 'Matt Pocock', handle: '@mattpocockuk', subject: 'Post by Matt Pocock on X', url: 'https://x.com/mattpocockuk/status/2026296080602673316', summary: 'AI coding demands a \'lead dev\' mentality. Engineers who spent their pre-AI career leveling up teammates through API design, feedback loops, and architecture find working with AI natural. Those who only focused on personal output struggle. Mentoring skills transfer directly to agent steering.', topics: ["management", "agent-design"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '48.9K', notes: 'Short but insightful — lead dev skills = agent steering skills', enriched: true, content: '' },
  { id: 'post-258', date: '2026-02-23', author: 'Dr Milan Milanović', handle: '@milan_milanovic', subject: 'Post by Dr Milan Milanović on X', url: 'https://x.com/milan_milanovic/status/2025835518207127968', summary: 'Explainer on git worktree — a Git 2.5 feature (2015) that lets you check out multiple branches into separate directories simultaneously. No stashing, no WIP commits, no cloning. Worktrees share a single .git directory. Useful for mid-feature hotfixes and parallel work.', topics: ["dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Not AI-specific but relevant — Claude Code uses worktrees for agent isolation', enriched: true, content: '' },
  { id: 'post-259', date: '2026-02-23', author: 'Ejaaz', handle: '@cryptopunk7213', subject: 'Post by Ejaaz on X', url: 'https://x.com/cryptopunk7213/status/2025761121328582814', summary: 'Weekly AI recap: Gemini 3.1 disappointed, Google dropped Lyria 3 (AI song gen) and Pomelli (1-shot product photoshoots), Microsoft pioneered data storage on glass (10K year lifespan), Taalus fused AI into silicon at 17K tokens/sec, Apple releasing 3 AI devices (glasses, camera airpods, pendant), Anthropic\'s security tool wiped $10B off cybersecurity stocks within an hour of launch.', topics: ["industry"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: 'Casual weekly roundup — some interesting data points (Anthropic security tool market impact)', enriched: true, content: '' },
  { id: 'post-260', date: '2026-02-23', author: 'Jeremy Daly', handle: '@jeremy_daly', subject: 'Post by Jeremy Daly on X', url: 'https://x.com/jeremy_daly/status/2025677417398821351', summary: '100+ page writeup on building multi-tenant commercial AI agent systems, distilled from experience inside a large SaaS platform serving hundreds of enterprise customers. Covers isolation, auditability, retention, cost control, orchestration models, retrieval architectures, and evaluation harnesses under real-world conditions.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team", "leadership"], priority: 'now', sourceType: 'tweet', views: '', notes: 'Comprehensive real-world guide to enterprise agent architecture — very high signal', enriched: true, content: '' },
  { id: 'post-261', date: '2026-02-21', author: 'Akshay 🚀', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2025767534159835443', summary: 'Skill Graphs > SKILL .md Everyone\'s talking about skills for AI agents. But almost nobody is talking about how to structure them. Right now, the default approach is simple. You write one skill file that captures one capability.', topics: ["agent-design", "skills-mcp"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '83000', notes: '', enriched: true, content: '' },
  { id: 'post-262', date: '2026-02-21', author: 'tuna', handle: '@tunahorse21', subject: 'Post by tuna🍣 on X', url: 'https://x.com/tunahorse21/status/2024974148259512677', summary: 'Highlights \'Plankton\' by Alex Fazio — a linting guard that LLM coding agents can\'t cheat. Addresses the common pain of AI agents ignoring linting rules and creating endless pre-commit error loops. Quote tweet of the article introducing the tool.', topics: ["dev-practices", "agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '24.6K', notes: 'Tool to enforce linting compliance for AI coding agents', enriched: true, content: '' },
  { id: 'post-263', date: '2026-02-20', author: 'Charly Wargnier', handle: '@DataChaz', subject: 'Post by Charly Wargnier on X', url: 'https://x.com/datachaz/status/2024803152730423685', summary: 'Argues CLAUDE.md is now the most important file in your repo — an onboarding doc for AI agents. Like .gitconfig on steroids: forces AI to verify its own work, auto-fixes CI bugs, demands elegant solutions over hacky fixes. Writing clear machine instructions is the new 10x dev skill.', topics: ["claude-code", "prompting", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '53.5K', notes: 'Directly relevant — we use CLAUDE.md extensively', enriched: true, content: '' },
  { id: 'post-264', date: '2026-02-20', author: 'Adam', handle: '@adamdotdev', subject: 'Post by Adam on X', url: 'https://x.com/adamdotdev/status/2024525246993506346', summary: 'Honest reflection from the creator of OpenCode: nobody has truly figured out agentic programming yet. Misses mundane coding tasks that broke up the day, acknowledges the productivity boost but warns about the distance that creeps between you and the codebase. Getting apathetic and prompting for even small changes is a real risk.', topics: ["agent-design", "management"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Refreshingly honest — important counterpoint to the hype around AI coding', enriched: true, content: '' },
  { id: 'post-265', date: '2026-02-19', author: 'Aman', handle: '@Amank1412', subject: 'Post by Aman on X', url: 'https://x.com/amank1412/status/2023754885473394918', summary: 'Garry Tan (YC CEO) shared his CLAUDE.md prompt for Claude Code that helps him ship 4,000+ line features with full tests in about an hour. Key pattern: Claude does a structured review (architecture → code quality → tests → performance) before writing code, presents tradeoffs with opinionated recommendations, and pauses for feedback. Essentially using Claude as a senior engineer reviewer.', topics: ["claude-code", "prompting", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '', notes: 'YC CEO\'s CLAUDE.md — directly relevant to our own setup', enriched: true, content: '' },
  { id: 'post-266', date: '2026-02-19', author: 'J.B.', handle: '@VibeMarketer_', subject: 'Post by J.B. on X', url: 'https://x.com/vibemarketer_/status/2019435524532904205', summary: 'Describes \'recursive self-improvement loops\' for Claude: instead of prompting once and shipping, the model generates output, scores it against criteria, diagnoses weaknesses, rewrites, and re-evaluates in a loop until it passes. Pattern works for email sequences, ad creative, landing pages. Essentially self-evaluating agent loops for content quality.', topics: ["prompting", "agent-design"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '960K', notes: 'Marketing-focused but the recursive self-evaluation pattern is broadly applicable', enriched: true, content: '' },
  { id: 'post-267', date: '2026-02-18', author: 'Viv', handle: '@vtrivedy10', subject: 'Post by Viv on X', url: 'https://x.com/Vtrivedy10/status/2029576534159835443', summary: 'the deepagents library is basically our starting point for doing harness engineering and shipping agents the internal agents used at the company are built on it (background coding, GTM/SDR, research)', topics: ["agent-design"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '12K', notes: '', enriched: true, content: '' },
  { id: 'post-268', date: '2026-02-18', author: 'Tech with Mak', handle: '@techNmak', subject: 'Post by Tech with Mak on X', url: 'https://x.com/technmak/status/2023990222027915746', summary: 'Quote-tweets Matthew Berman\'s OpenClaw masterclass video covering 21 daily use cases. Berman claims 2.54 billion tokens spent perfecting OpenClaw workflows, covers MD files, memory systems, CRM, and more.', topics: ["agent-design", "prompting"], audience: ["me"], priority: 'long-term', sourceType: 'video', views: '1.3M', notes: 'Video content — bookmarked for manual review. Matthew Berman\'s OpenClaw masterclass.', enriched: true, content: '' },
  { id: 'post-269', date: '2026-02-18', author: 'Matt Dancho', handle: '@mdancho84', subject: 'Post by Matt Dancho (Business Science) on X', url: 'https://x.com/mdancho84/status/2023738764841894352', summary: 'Claims becoming a 10x engineer is now just a SKILLS.md file. Brief post (1M views) pointing to skills-based AI workflow configuration as the key leverage point for developer productivity.', topics: ["claude-code", "prompting"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '1M', notes: 'Very brief but high engagement — skills files as key AI dev leverage', enriched: true, content: '' },
  { id: 'post-270', date: '2026-02-17', author: 'Dr Milan Milanović', handle: '@milan_milanovic', subject: 'Post by Dr Milan Milanović on X', url: 'https://x.com/milan_milanovic/status/2023381859489767772', summary: 'Argues the real threat isn\'t AI replacing developers but replacing the software development process. Code is becoming cheap, decisions are becoming expensive. AI reduces typing, not thinking. Developers who only implement tasks will struggle; those who understand product, domain, and system will thrive. Small teams will ship what once required departments.', topics: ["management", "industry"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'Good framing for leadership discussions about AI adoption', enriched: true, content: '' },
  { id: 'post-271', date: '2026-02-15', author: 'Pavol Lupták', handle: '@wilderko', subject: 'Post by Pavol Lupták on X', url: 'https://x.com/wilderko/status/2025159534159835443', summary: 'A collection of 76 production-ready Claude Skills covering frontend, backend, DevOps, infrastructure, security, cloud, and AI/ML development. Skills provide Claude with domain expertise, decision frameworks, and production-ready code patterns.', topics: ["claude-code", "skills-mcp"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '130K', notes: '', enriched: true, content: '' },
  { id: 'post-272', date: '2026-02-14', author: 'dax', handle: '@thdxr', subject: 'Post by dax on X', url: 'https://x.com/thdxr/status/2022574719694758147', summary: 'Contrarian reality check on AI productivity: orgs rarely have good ideas (expensive implementation was actually helping filter), most workers use AI to do less work not more, the 2 good engineers on your team are now buried in slop code from everyone else, you\'re still bottlenecked by bureaucracy, and your CFO is asking why each engineer now costs $2K/month extra in LLM bills.', topics: ["management", "industry"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '1M', notes: '1M views — sharp contrarian take. SST/OpenCode creator. Important counterpoint to AI hype.', enriched: true, content: '' },
  { id: 'post-273', date: '2026-02-12', author: 'Aakash Gupta', handle: '@aakashgupta', subject: 'Post by Aakash Gupta on X', url: 'https://x.com/aakashgupta/status/2021709282224587141', summary: 'Karpathy released microGPT — a complete GPT in 243 lines of Python with only os, math, random, and argparse as imports. Hand-rolled autograd engine in ~40 lines. Fifth iteration in a 6-year compression arc: micrograd (2020) → minGPT → nanoGPT → llm.c (2024) → microgpt (2026). Each step removed a layer of abstraction; this one removed all of them.', topics: ["research"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: 'X article — Karpathy\'s educational GPT implementations keep getting more minimal', enriched: true, content: '' },
  { id: 'post-274', date: '2026-02-12', author: 'Spencer Baggins', handle: '@bigaiguy', subject: 'Post by Spencer Baggins on X', url: 'https://x.com/bigaiguy/status/2021532622963585214', summary: 'Describes \'Socratic prompting\' — asking the AI questions instead of telling it what to do. Claims this technique separates beginners from experts, improving output quality from 6.2/10 to 9.1/10.', topics: ["questionable", "prompting"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '900.2K', notes: 'Engagement farming format (\'leaked technique\', fake scores) but Socratic prompting is a legitimate technique', enriched: true, content: '' },
  { id: 'post-275', date: '2026-02-12', author: 'kitze', handle: '@thekitze', subject: 'Post by kitze 🛠️ tinkerer.club on X', url: 'https://x.com/thekitze/status/2021494167113990464', summary: 'Chrome 146 includes early preview of WebMCP — lets AI agents query and execute services without browsing the web app like a user. Services declared via navigator.modelContext API or declaratively through forms. kitze calls it \'the new responsive design\' — web apps must open up or die.', topics: ["skills-mcp", "industry"], audience: ["me", "dev-team", "leadership"], priority: 'now', sourceType: 'tweet', views: '84.6K', notes: 'WebMCP in Chrome — huge deal. Browser-native MCP support for web apps.', enriched: true, content: '' },
  { id: 'post-276', date: '2026-02-09', author: 'Peter Steinberger', handle: '@steipete', subject: 'Post by Peter Steinberger 🦞 on X', url: 'https://x.com/steipete/status/2020704611640705485', summary: 'Shares a prompt to rewrite your SOUL.md (agent personality config) to make it less corporate: have strong opinions, delete corporate-sounding rules, ban filler phrases, enforce brevity, allow humor and swearing when appropriate, call out bad ideas directly. Credited to Molty.', topics: ["prompting", "agent-design"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: 'Fun personality tuning for agent configs — could inform our own CLAUDE.md tone', enriched: true, content: '' },
  { id: 'post-277', date: '2026-02-07', author: 'Machina', handle: '@EXM7777', subject: 'Post by Machina on X', url: 'https://x.com/exm7777/status/2019787951530725396', summary: 'Addresses AI FOMO — the feeling of falling behind as new models/tools drop weekly. Argues the problem isn\'t too much happening but lack of a filter between news and what matters for your work. Mentions GPT-5.3 Codex and Opus 4.6 dropping on the same day. X article format.', topics: ["general", "management"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '812K', notes: 'Engagement farming tone but relatable message about AI overwhelm', enriched: true, content: '' },
  { id: 'post-278', date: '2026-02-07', author: 'chiefofautism', handle: '@chiefofautism', subject: 'Post by chiefofautism on X', url: 'https://x.com/chiefofautism/status/2019608146692673886', summary: 'Shares Shannon Lite by KeygraphHQ — an autonomous, white-box AI pentester for web applications. Open-source GitHub project.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '215.3K', notes: 'Open-source AI security scanner — similar space to the Joseph Thacker/Claude Code security post', enriched: true, content: '' },
  { id: 'post-279', date: '2026-02-05', author: 'Dave Kline', handle: '@dklineii', subject: 'Post by Dave Kline on X', url: 'https://x.com/dklineii/status/2018690947215663592', summary: 'Management differs by level — different abilities, priorities, skills at each tier. Most managers fail because they\'re put in with no training, little support, and unrealistic expectations. Infographic-style breakdown of how the job changes by level.', topics: ["management"], audience: ["me", "leadership"], priority: 'long-term', sourceType: 'tweet', views: '36.3K', notes: 'Not AI-specific — general management advice', enriched: true, content: '' },
  { id: 'post-280', date: '2026-01-28', author: 'ryan vogel', handle: '@ryanvogel', subject: 'Post by ryan vogel on X', url: 'https://x.com/ryanvogel/status/2016204202343571474', summary: 'Dynamic agents.md resolution is now live in OpenCode — allows agent configuration files to be resolved dynamically. Suggests pairing with a /learn command for adaptive agent behavior.', topics: ["agent-design", "claude-code", "prompting"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '56.6K', notes: 'OpenCode feature — dynamic agent config resolution, relevant to our CLAUDE.md approach', enriched: true, content: '' },

];
const TOPIC_LABELS = {
    'agent-design': 'Agent Design',
    'claude-code': 'Claude Code',
    'dev-practices': 'Dev Practices',
    'skills-mcp': 'Skills & MCP',
    'prompting': 'Prompting',
    'research': 'Research',
    'industry': 'Industry',
    'management': 'Management',
    'general': 'General',
    'questionable': 'Questionable'
};

const TOPIC_COLORS = {
    'agent-design': 'var(--accent-blue)',
    'claude-code': 'var(--accent-purple)',
    'dev-practices': 'var(--accent-green)',
    'skills-mcp': 'var(--accent-teal)',
    'prompting': 'var(--accent-amber)',
    'research': 'var(--accent-cyan)',
    'industry': 'var(--accent-rose)',
    'management': 'var(--accent-orange)',
    'general': 'var(--text-muted)',
    'questionable': 'var(--accent-rose)'
};

let currentView = 'list';
let groupByTopic = true;
let activeFilters = { topic: [], priority: [], audience: [], enriched: [] };
let expandedId = null;
let searchQuery = '';

function toggleFilter(el) {
    const f = el.dataset.filter;
    const v = el.dataset.value;
    const cls = el.dataset.active;
    const idx = activeFilters[f].indexOf(v);
    if (idx >= 0) {
        activeFilters[f].splice(idx, 1);
        el.classList.remove(cls);
    } else {
        activeFilters[f].push(v);
        el.classList.add(cls);
    }
    render();
}

function setView(v) {
    currentView = v;
    document.getElementById('listBtn').classList.toggle('active', v === 'list');
    document.getElementById('cardsBtn').classList.toggle('active', v === 'cards');
    expandedId = null;
    render();
}

function toggleGrouping() {
    groupByTopic = !groupByTopic;
    document.getElementById('groupBtn').classList.toggle('active', groupByTopic);
    render();
}

function onSearch() {
    searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
    document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
    render();
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    document.getElementById('searchClear').classList.remove('visible');
    render();
}

function matchesSearch(post) {
    if (!searchQuery) return true;
    const terms = searchQuery.split(/\s+/);
    const haystack = [
        post.date, post.author, post.handle, post.subject,
        post.summary, post.notes, ...(post.topics || []),
        ...(post.audience || []), post.priority, post.views
    ].join(' ').toLowerCase();
    return terms.every(t => haystack.includes(t));
}

function matchesFilters(post) {
    for (const [key, vals] of Object.entries(activeFilters)) {
        if (vals.length === 0) continue;
        if (key === 'topic') {
            if (!vals.some(v => (post.topics || []).includes(v))) return false;
        } else if (key === 'audience') {
            if (!vals.some(v => (post.audience || []).includes(v))) return false;
        } else if (key === 'priority') {
            if (!vals.includes(post.priority)) return false;
        } else if (key === 'enriched') {
            const enrichedStr = String(!!post.enriched);
            if (!vals.includes(enrichedStr)) return false;
        }
    }
    return true;
}

function getFiltered() {
    return POSTS.filter(p => matchesFilters(p) && matchesSearch(p));
}

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function priorityTag(p) {
    const cls = p === 'now' ? 'tag-now' : p === 'near-term' ? 'tag-near' : 'tag-long';
    return `<span class="tag ${cls}">${esc(p)}</span>`;
}

function topicTags(topics) {
    return (topics || []).map(t =>
        `<span class="tag tag-topic" style="background:${TOPIC_COLORS[t]}22;color:${TOPIC_COLORS[t]}">${esc(TOPIC_LABELS[t] || t)}</span>`
    ).join('');
}

function postId(p) {
    return `${p.date}_${p.author}`.replace(/\s/g, '_');
}

function toggleExpand(id) {
    expandedId = expandedId === id ? null : id;
    render();
}

function renderListRow(p) {
    const id = postId(p);
    const isExpanded = expandedId === id;
    const customSubject = p.subject && !p.subject.startsWith('Post by ');
    const displaySubject = customSubject ? p.subject : '';
    const previewBadge = !p.enriched ? '<span class="tag tag-preview">preview</span>' : '';

    let html = `<div class="row-wrapper${isExpanded ? ' expanded' : ''}" onclick="toggleExpand('${id}')">
      <div class="row">
        <span class="row-date">${p.date.substring(5)}</span>
        <div class="row-main">
            <div class="row-title-line">
                <span class="row-title"><span class="author-name">${esc(p.author)}</span>${p.handle ? ' <span style="color:var(--text-muted);font-size:0.85em">' + esc(p.handle) + '</span>' : ''}${displaySubject ? ' — <span style="color:var(--accent-amber);font-size:0.85em">' + esc(displaySubject) + '</span>' : ''}</span>
                <div class="row-tags">${previewBadge}${priorityTag(p.priority)}${topicTags(p.topics.slice(0,2))}</div>
            </div>
            <div class="row-snippet">${esc(p.summary)}</div>
        </div>
      </div>`;

    if (isExpanded) {
        html += `<div class="row-expanded">
            <div class="expanded-header">
                <div><span class="expanded-author">${esc(p.author)}</span><span class="expanded-handle">${esc(p.handle)}</span></div>
                <span class="expanded-date">${p.date}${p.views ? ' · ' + esc(p.views) + ' views' : ''}</span>
            </div>
            ${displaySubject ? '<div class="expanded-subject">' + esc(displaySubject) + '</div>' : ''}
            <div class="expanded-summary">${esc(p.summary)}</div>
            ${p.notes ? '<div class="expanded-notes">' + esc(p.notes) + '</div>' : ''}
            <div class="expanded-meta">
                ${topicTags(p.topics)}
                ${priorityTag(p.priority)}
                ${(p.audience||[]).map(a => '<span class="tag" style="background:rgba(148,163,184,0.1);color:var(--text-secondary)">' + esc(a) + '</span>').join('')}
                ${!p.enriched ? '<span class="tag tag-preview">email preview only</span>' : ''}
                ${p.url ? '<a class="expanded-link" href="' + esc(p.url) + '" target="_blank" onclick="event.stopPropagation()">Open link &#8599;</a>' : ''}
            </div>
        </div>`;
    }
    html += '</div>';
    return html;
}

function renderCard(p) {
    const customSubject = p.subject && !p.subject.startsWith('Post by ');
    const previewBadge = !p.enriched ? '<span class="tag tag-preview">preview</span>' : '';
    return `<div class="card">
        <div class="card-header">
            <div><span class="card-author">${esc(p.author)}</span> <span class="card-handle">${esc(p.handle)}</span></div>
            <span class="card-date">${p.date}${p.views ? ' · ' + p.views : ''}</span>
        </div>
        ${customSubject ? '<div class="card-subject">' + esc(p.subject) + '</div>' : ''}
        <div class="card-summary">${esc(p.summary)}</div>
        ${p.notes ? '<div class="card-notes">' + esc(p.notes) + '</div>' : ''}
        <div class="card-footer">
            ${topicTags(p.topics)}
            ${priorityTag(p.priority)}
            ${previewBadge}
            ${p.url ? '<a class="card-link" href="' + esc(p.url) + '" target="_blank">Open &#8599;</a>' : ''}
        </div>
    </div>`;
}

function getDateRange() {
    if (POSTS.length === 0) return 'No posts';
    const earliest = POSTS[POSTS.length - 1].date;
    const latest = POSTS[0].date;
    const formatDate = (dateStr) => {
        const date = new Date(dateStr);
        const month = date.toLocaleString('en-US', { month: 'short' });
        const year = date.getFullYear();
        return `${month} ${year}`;
    };
    return `${formatDate(earliest)} – ${formatDate(latest)}`;
}

function render() {
    const filtered = getFiltered();
    const total = POSTS.length;
    const enrichedCount = POSTS.filter(p => p.enriched).length;

    document.getElementById('stats').innerHTML =
        `Showing <span>${filtered.length}</span> of <span>${total}</span> links · ` +
        `<span>${enrichedCount}</span> enriched · ` +
        `<span>${total - enrichedCount}</span> previews · ` +
        `${getDateRange()}`;

    const container = document.getElementById('content');

    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results"><h3>No matches</h3><p>Try adjusting your filters or search query.</p></div>';
        return;
    }

    if (currentView === 'cards') {
        if (groupByTopic) {
            const groups = {};
            filtered.forEach(p => {
                const mainTopic = (p.topics && p.topics[0]) || 'general';
                if (!groups[mainTopic]) groups[mainTopic] = [];
                groups[mainTopic].push(p);
            });
            const order = ['agent-design','claude-code','dev-practices','skills-mcp','prompting','research','industry','management','general','questionable'];
            let html = '';
            for (const topic of order) {
                if (!groups[topic]) continue;
                html += `<div class="group-header">${esc(TOPIC_LABELS[topic] || topic)} <span class="group-count">${groups[topic].length}</span></div>`;
                html += '<div class="cards-grid">';
                html += groups[topic].map(renderCard).join('');
                html += '</div>';
            }
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="cards-grid">' + filtered.map(renderCard).join('') + '</div>';
        }
    } else {
        if (groupByTopic) {
            const groups = {};
            filtered.forEach(p => {
                const mainTopic = (p.topics && p.topics[0]) || 'general';
                if (!groups[mainTopic]) groups[mainTopic] = [];
                groups[mainTopic].push(p);
            });
            const order = ['agent-design','claude-code','dev-practices','skills-mcp','prompting','research','industry','management','general','questionable'];
            let html = '';
            for (const topic of order) {
                if (!groups[topic]) continue;
                html += `<div class="group-header">${esc(TOPIC_LABELS[topic] || topic)} <span class="group-count">${groups[topic].length}</span></div>`;
                html += groups[topic].map(renderListRow).join('');
            }
            container.innerHTML = html;
        } else {
            container.innerHTML = filtered.map(renderListRow).join('');
        }
    }
}

// Init
render();

// Keyboard shortcut: Escape to clear search
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') clearSearch();
    if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
        e.preventDefault();
        document.getElementById('searchInput').focus();
    }
});
</script>
