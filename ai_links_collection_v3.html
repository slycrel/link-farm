  { id: 'post-96', date: '2026-04-14', author: 'Alex Vacca', handle: '@itsalexvacca', subject: 'Post by Alex Vacca on X', url: 'https://x.com/itsalexvacca/status/2043834187095150673', summary: 'Alex Vacca highlights a 4-layer sales funnel architecture that produced 330K website visitors, 1,500+ meetings booked, and $4M new ARR — crossing $7M ARR without raising capital. Quote-tweets an article by Michel Lieben detailing the system.', topics: ["management", "industry"], audience: ["me", "leadership"], priority: 'long-term', sourceType: 'tweet', views: '22K', notes: '', enriched: true, content: 'Quote tweet of Michel Lieben article on 4-layer funnel architecture. $7M ARR bootstrapped.' },
  { id: 'post-97', date: '2026-04-14', author: 'am.will', handle: '@llmjunky', subject: 'Post by am.will on X', url: 'https://x.com/llmjunky/status/2043817254152814785', summary: 'am.will recommends NVIDIA\'s free API credits for testing open-source models (Minimax 2.7, Qwen 3.5, GLM 5, Gemma 31B, Nemotron 3 Super 120B) via their OpenAI-compatible endpoint at integrate.api.nvidia.com/v1. Includes ready-to-paste config for any OpenAI-compatible client.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'NVIDIA free API credits for open source models. OpenAI compatible endpoint config provided.' },
  { id: 'post-98', date: '2026-04-14', author: 'Phil Chen', handle: '@philhchen', subject: 'Post by Phil Chen on X', url: 'https://x.com/philhchen/status/2043759400121458922', summary: 'Phil Chen describes building Filbert (phil-bot), a background coding agent that wrote 95%+ of their PRs in one week. Runs 14 scheduled daily jobs including production bug triage, security audits, dead code sweeps, and CI optimization. Argues lightweight wrappers around existing harnesses on your own infra is the future of coding agents.', topics: ["agent-design", "dev-practices", "claude-code"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '116.5K', notes: '', enriched: true, content: 'Filbert coding agent: 95%+ PRs, 14 daily scheduled jobs, lightweight wrapper on existing harness.' },
  { id: 'post-99', date: '2026-04-14', author: 'How To AI', handle: '@howtoai_', subject: 'Post by How To AI on X', url: 'https://x.com/howtoai_/status/2043753502850351525', summary: 'How To AI covers a math paper proving every elementary function (sin, exp, log, sqrt) derives from a single binary operator: eml(x,y) = exp(x) - ln(y). Combined with the number 1, it can build pi, square roots, trig — analogous to NAND gates in digital logic. Implications for neural network architecture and potential hardware optimization.', topics: ["research"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Math paper: single binary operator eml(x,y) = exp(x) - ln(y) generates all elementary functions.' },
  { id: 'post-100', date: '2026-04-14', author: 'Kevin Simback', handle: '@ksimback', subject: 'Post by Kevin Simback 🍷 on X', url: 'https://x.com/ksimback/status/2043745657748361476', summary: 'Kevin Simback shares his \'Second Brain\' setup using a modified Karpathy method. Key insight: the system needs two authors — the human writes opinionated takes and decisions, the AI agent handles structured knowledge extraction and organization. Avoids both the \'LLM-wiki\' problem (generic AI prose) and the \'can\'t keep up\' problem (manual-only decay).', topics: ["agent-design", "prompting"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '13K', notes: '', enriched: true, content: 'Second brain setup with two-author model: human writes opinions, AI handles structured knowledge.' },
  { id: 'post-101', date: '2026-04-14', author: 'Akshay', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2043745099792953508', summary: 'Akshay provides a first-principles walkthrough of agent memory: from Python lists to markdown files to vector search to graph-vector hybrids. Covers 7 failure modes of stateless agents (context amnesia, zero personalization, repeated mistakes, etc.) and builds up to a clean open-source solution for persistent agent memory.', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '103K', notes: '', enriched: true, content: 'First-principles agent memory walkthrough: lists to vectors to graph hybrids. 7 failure modes covered.' },
  { id: 'post-102', date: '2026-04-14', author: 'Alex Finn', handle: '@alexfinn', subject: 'Post by Alex Finn on X', url: 'https://x.com/alexfinn/status/2043719233213980922', summary: 'Alex Finn shares a SOUL.md prompt philosophy inspired by Garry Tan\'s post: demand completeness over \'good enough,\' never table things for later when the permanent solve is in reach, always ship with tests and documentation. Includes a copy-paste prompt for OpenClaw/Hermes agents.', topics: ["prompting", "claude-code"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'SOUL.md prompt for agent completeness: do the whole thing, with tests, with docs. Inspired by Garry Tan.' },
  { id: 'post-103', date: '2026-04-14', author: 'Philipp Schmid', handle: '@_philschmid', subject: 'Post by Philipp Schmid on X', url: 'https://x.com/_philschmid/status/2043705197030002904', summary: 'Philipp Schmid shares 8 practical tips for writing better agent skills — from what kinds of skills exist to knowing when to retire one. Covers skill lifecycle, quality standards, and distribution patterns. Links to a full X article with the guide.', topics: ["skills-mcp", "agent-design"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '18.2K', notes: '', enriched: true, content: '8 tips for writing agent skills: lifecycle, quality gates, when to retire. Full article linked.' },
  { id: 'post-104', date: '2026-04-14', author: 'North@CreaoAI', handle: '@anorth_chen', subject: 'Post by North@CreaoAI on X', url: 'https://x.com/anorth_chen/status/2043694726764003817', summary: 'North from CreaoAI shares their CTO Peter Pang\'s article on AI-First development. Their team merges 20+ PRs daily with 99% AI-written production code. Quote-tweets Peter\'s article arguing most teams are still \'AI-assisted\' rather than truly \'AI-first,\' and predicts teams that don\'t shift will fade within a year.', topics: ["management", "agent-design"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'AI-First dev: 20+ PRs/day, 99% AI-written code. CTO Peter Pang article on AI-first vs AI-assisted.' },
  { id: 'post-105', date: '2026-04-14', author: 'Tech with Mak', handle: '@technmak', subject: 'Post by Tech with Mak on X', url: 'https://x.com/technmak/status/2043683120319520806', summary: 'Tech with Mak highlights three Karpathy observations about LLM coding failures — wrong assumptions without checking, overcomplicated code, and silent modification of unrelated code. Someone turned these into a CLAUDE.md file with four principles: think before coding, respect existing patterns, stay minimal, and never touch what you don\'t understand.', topics: ["claude-code", "prompting", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Karpathy\'s LLM coding mistakes turned into CLAUDE.md: think first, respect patterns, stay minimal.' },
  { id: 'post-106', date: '2026-04-14', author: 'Lorenzo Rondan', handle: '@lorenrd', subject: 'Post by Lorenzo Rondan on X', url: 'https://x.com/lorenrd/status/2043677918262395235', summary: 'Lorenzo Rondan highlights a diagram by Viv (@Vtrivedy10) on agent harness architecture, memory, and context fragments. The quoted thread explores intersections between harness design, long-timescale memory accumulation, and the \'bitter lesson\' that search-based approaches tend to win. 213.9K views.', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '213.9K', notes: '', enriched: true, content: 'Harness architecture diagram: memory, context fragments, and the bitter lesson of search.' },
  { id: 'post-107', date: '2026-04-14', author: 'Vaishnavi', handle: '@_vmlops', subject: 'Post by Vaishnavi on X', url: 'https://x.com/_vmlops/status/2043624154646409708', summary: 'Vaishnavi covers Google\'s open-sourced Magika — an AI-powered file content type detection tool. Trained on 100M files, 200+ content types, 99% accuracy at 5ms/file. Sees through renamed malware and disguised scripts. Install via pip install magika. github.com/google/magika', topics: ["dev-practices", "agent-design", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '426.4K', notes: '', enriched: true, content: 'Google Magika: AI file type detection, 99% accuracy, 5ms/file. pip install magika. github.com/google/magika' },
  { id: 'post-108', date: '2026-04-14', author: 'Noisy', handle: '@noisyb0y1', subject: 'Post by Noisy on X', url: 'https://x.com/noisyb0y1/status/2043609541477044439', summary: 'Noisy describes a Google engineer who automated 80% of his work with Claude Code using a CLAUDE.md file based on Karpathy\'s principles and a .NET orchestration app. Covers the Karpathy-inspired CLAUDE.md, a dotnet service that spawns Claude Code instances with git worktrees, and a review pipeline. Claims $28K passive income working 2-3 hours/day.', topics: ["claude-code", "agent-design", "dev-practices", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '2.1M', notes: '', enriched: true, content: 'Google engineer automated 80% of work with Claude Code + .NET harness + Karpathy CLAUDE.md. Git worktree orchestration.' },
  { id: 'post-109', date: '2026-04-13', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2043581361798500602', summary: 'Garry Tan adds \'Boil the ocean\' to his SOUL.md: the marginal cost of completeness is near zero with AI. Do the whole thing with tests, docs, and quality. Never table for later, never present workarounds, never leave dangling threads. 433.1K views.', topics: ["prompting", "management", "claude-code"], audience: ["me", "dev-team", "leadership"], priority: 'now', sourceType: 'tweet', views: '433.1K', notes: '', enriched: true, content: 'SOUL.md addition: \'Boil the ocean\' — marginal cost of completeness is near zero with AI. Ship complete.' },
  { id: 'post-110', date: '2026-04-13', author: 'Defileo', handle: '@defileo', subject: 'Post by Defileo🔮 on X', url: 'https://x.com/defileo/status/2043437202190024912', summary: 'Defileo promotes a \'prompt vault\' going beyond the classic f/prompts.chat role-based prompts (159K GitHub stars). Claims deeper structured prompts with phases, diagnostic questions, and domain-specific workflows for Claude. Engagement-farming style but references the real prompts.chat repo.', topics: ["prompting", "questionable"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Prompt vault building on prompts.chat (159K stars). Structured role prompts with phases and diagnostics.' },
  { id: 'post-111', date: '2026-04-13', author: 'Charly Wargnier', handle: '@datachaz', subject: 'Post by Charly Wargnier on X', url: 'https://x.com/datachaz/status/2043246635996807300', summary: 'Charly Wargnier covers Addy Osmani\'s (Google) new Agent Skills package: 19 engineering skills + 7 commands for AI coding agents, based on Google best practices. Covers the full dev lifecycle — define (specs), plan (decompose), build (incremental), verify (TDD), review (security), ship (CI/CD). Aims to prevent agents from skipping quality gates.', topics: ["skills-mcp", "dev-practices", "agent-design"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Addy Osmani\'s Agent Skills: 19 skills + 7 commands for AI coding agents. Google best practices across full dev lifecycle.' },
  { id: 'post-112', date: '2026-04-12', author: 'Ahmad', handle: '@theahmadosman', subject: 'Post by Ahmad on X', url: 'https://x.com/theahmadosman/status/2043366810494337354', summary: 'Ahmad shares his approach to running parallel coding agents: fan out from a main agent or use deterministic scripts. Pattern: spin up workers in git worktrees, gate merges with diffs, add backups/rules/logs for deterministic runs, merge what passes. Building this into a Skill.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '26.3K', notes: '', enriched: true, content: 'Parallel agent pattern: git worktrees, diff gating, deterministic scripts. Building into a Skill.' },
  { id: 'post-113', date: '2026-04-12', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2043339811088699446', summary: 'Garry Tan comments on Hermes agent\'s explicit self-improvement architecture — noting that applied research at the app level now happens in the open via open source. Quote-tweets analysis of Hermes codebase showing its approach to self-improvement goes beyond typical agent patterns.', topics: ["agent-design", "research"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '29.6K', notes: '', enriched: true, content: 'Hermes agent\'s explicit self-improvement architecture. Applied research now happens in open source.' },
  { id: 'post-114', date: '2026-04-12', author: 'Nav Toor', handle: '@heynavtoor', subject: 'Post by Nav Toor on X', url: 'https://x.com/heynavtoor/status/2043321909971202403', summary: 'Nav Toor covers LLM Wiki v2 — an extension of Karpathy\'s original LLM Wiki pattern (5K stars in 48h). Adds confidence scoring (source count, recency, contradictions), memory tiers (working/episodic/semantic/procedural), knowledge graphs with typed entities, automated hooks, and forgetting curves for knowledge decay.', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'LLM Wiki v2: confidence scoring, memory tiers, knowledge graphs, forgetting curves. Extension of Karpathy pattern.' },
  { id: 'post-115', date: '2026-04-12', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2043198780800197025', summary: 'Garry Tan argues memory should outlive the harness — memory is markdown, skills are markdown, brain is a git repo. The harness should be a thin conductor that reads files, not owns them. Quote-tweets Harrison Chase\'s article on harness-memory coupling and the risks of closed harnesses. 430.4K views.', topics: ["agent-design", "management"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '430.4K', notes: '', enriched: true, content: 'Memory as markdown in git, harness as thin conductor. QT Harrison Chase on harness-memory coupling.' },
  { id: 'post-116', date: '2026-04-12', author: 'Nick Spisak', handle: '@nickspisak_', subject: 'Post by Nick Spisak on X', url: 'https://x.com/nickspisak_/status/2043060265823146202', summary: 'Nick Spisak explains Claude Code\'s new /ultraplan feature: 4 Opus agents plan in parallel (3 explorers + 1 critic) on Anthropic\'s cloud. Covers when the review workflow matters more than speed, 5 scenarios preventing hours of rework, and when to skip it for local plan mode instead. 250.3K views.', topics: ["claude-code"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '250.3K', notes: '', enriched: true, content: 'Claude Code /ultraplan: 4 Opus agents (3 explorers + 1 critic) planning in parallel. Full explainer.' },
  { id: 'post-117', date: '2026-04-12', author: 'Garry Tan', handle: '@garrytan', subject: 'Post by Garry Tan on X', url: 'https://x.com/garrytan/status/2042919242283258072', summary: 'Garry Tan announces GBrain\'s new guided integration recipes for OpenClaw and Hermes Agent setup. Addresses the struggle new users face getting integrations (mail, calendar, etc.) configured, which is needed to scale to thousands of markdown files in the knowledge base. 36.5K views.', topics: ["agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '36.5K', notes: '', enriched: true, content: 'GBrain guided integration recipes for OpenClaw/Hermes. Solves setup friction for mail, calendar, etc.' },
  { id: 'post-118', date: '2026-04-11', author: 'Nav Toor', handle: '@heynavtoor', subject: 'Post by Nav Toor on X', url: 'https://x.com/heynavtoor/status/2042879339256254689', summary: 'Covers Kronos, an open-source foundation model for financial markets trained on 12 billion candlestick records from 45 exchanges (Binance, NYSE, NASDAQ, LSE, and more). Claims 93% more accurate than leading time series models, zero-shot across any asset/timeframe. Built at Tsinghua University, accepted at AAAI 2026. Ships in 4 sizes from 4M to 499M params; live BTC demo running. Available on HuggingFace.', topics: ["research", "industry", "questionable"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Someone built an AI that reads candlestick charts the way GPT reads English. Trained on 12 billion records from 45 exchanges. Outperforms every model by 93%. Live BTC demo. Free. It\'s called Kronos. The first open source foundation model built for financial markets...' },
  { id: 'post-119', date: '2026-04-10', author: 'Veeral Patel', handle: '@vral', subject: 'Post by Veeral Patel on X', url: 'https://x.com/vral/status/2042674854764130549', summary: 'Quote-tweets Ramp Labs article on "Latent Briefing" — a KV cache compaction technique for efficient memory sharing across multi-agent systems. Patel quips that passing .md files between agents will soon seem as archaic as mailing floppy disks. Paper tackles token inefficiency in hierarchical multi-agent architectures.', topics: ["agent-design", "research"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '86.4K', notes: '', enriched: true, content: 'we\'re gonna look back on passing .md files between agents the way we look back on mailing floppy disks around to move a file\n\nQuote: Ramp Labs @RampLabs - Article: Latent Briefing: Efficient Memory Sharing for Multi-Agent Systems via KV Cache Compaction - Multi-agent systems have shown promise in coordination, complex reasoning, and parallel workflows. However, they are often highly token inefficient.' },
  { id: 'post-120', date: '2026-04-10', author: 'Alpha Batcher', handle: '@alphabatcher', subject: 'Post by Alpha Batcher on X', url: 'https://x.com/alphabatcher/status/2042606770816704643', summary: 'Distills architectural principles for production AI agents by quoting Rohit\'s article reverse-engineering Claude Code\'s architecture (github.com/rohit4verse). Key patterns: async generators for streaming, parallel read-only tools vs serial write tools, tools executing during generation (not after), system prompt designed for cache efficiency, hierarchical context compaction cheapest-first, isolated worktree per sub-agent. Calls it the most detailed public breakdown of a production agent architecture available.', topics: ["agent-design", "claude-code", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '33.2K', notes: '', enriched: true, content: 'Architectural principles for building your own AI agent: async generator instead of while loop (streaming native), tools classified as read-only run parallel/write tools run serial, tools execute during generation not after, system prompt designed for cache efficiency, hierarchical compaction cheapest first, every error has recovery path inside the loop, each sub-agent gets isolated worktree and context. Infrastructure is the fourth layer without it you have a demo not a product.' },
  { id: 'post-121', date: '2026-04-10', author: 'Akshay', handle: '@akshay_pachaar', subject: 'Post by Akshay 🚀 on X', url: 'https://x.com/akshay_pachaar/status/2042586319390674994', summary: 'Comparison of how Anthropic, OpenAI, CrewAI, and LangChain approach the agent harness differently. The one agreement: the model is not the product, the infrastructure around it is. Anthropic bets on a deliberately thin "dumb loop" harness where the model makes all decisions. OpenAI takes a similar but slightly thicker approach. CrewAI and LangChain bet on heavier orchestration infrastructure. The core architectural question: as models get smarter, do you need less infrastructure or more?', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'What does every big company think about the agent harness? Anthropic, OpenAI, CrewAI, LangChain. They all build agents. They all wrap their models in infrastructure to make them useful. They each call it the harness. But they agree on one thing. And disagree on everything else. The agreement: the model is not the product. The infrastructure around the model is. The disagreement: how much of that infrastructure should exist.' },
  { id: 'post-122', date: '2026-04-10', author: 'Vaishnavi', handle: '@_vmlops', subject: 'Post by Vaishnavi on X', url: 'https://x.com/_vmlops/status/2042486942802321552', summary: 'Google open-sourced MCP Toolbox (github.com/googleapis/mcp-toolbox) — an MCP server that gives AI agents direct access to 20+ enterprise databases (Postgres, MySQL, MongoDB, BigQuery, Redis, Elasticsearch, Spanner, Snowflake) in plain English. Built-in connection pooling, auth, and OpenTelemetry. Works with LangChain, LlamaIndex, Genkit, and any MCP-compatible client. Less than 10 lines of code to integrate.', topics: ["skills-mcp", "agent-design"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '30K', notes: '', enriched: true, content: 'GOOGLE JUST MADE IT DEAD SIMPLE TO CONNECT AI AGENTS TO ANY DATABASE. postgres, mysql, mongodb, bigquery, redis, elasticsearch, spanner, snowflake. 20+ databases supported. mcp toolbox is an open source mcp server that gives your ai agents direct access to your enterprise databases in plain english.' },
  { id: 'post-123', date: '2026-04-10', author: 'Sigrid Jin', handle: '@realsigridjin', subject: 'Post by Sigrid Jin 🌈🙏 on X', url: 'https://x.com/realsigridjin/status/2042440330503733343', summary: 'Summary of "Better Harness" paper on using evals as a flywheel for agent improvement. Key insight: evals are the new training data — instead of updating weights, you update the agent harness. Warns that agents reward-hack evals, so you need strict train/test splits. Quality over quantity in eval design. The flywheel: mine prod traces for failures, turn into evals, auto-tweak prompts/tools, validate, repeat.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Evals are the new training data. Instead of updating weights, you are updating the agent harness. Problem is agents are famous cheaters. They will reward-hack your evals and overfit just to make the score go up. Solution is treat evals like real ML. You need strict train/test splits and holdout sets to force actual generalization. Quality over quantity.' },
  { id: 'post-124', date: '2026-04-10', author: 'Teknium', handle: '@teknium', subject: 'Post by Teknium (e/λ) on X', url: 'https://x.com/teknium/status/2042396576245825543', summary: 'Teknium claims Anthropic copied their "notify when done" feature from Hermes Agent (github.com/NousResearch/hermes-agent/pull/5779) — lets background processes notify the agent when finished instead of polling, so the agent can work on other tasks in the same session. Points to Claude Code\'s new Monitor tool as the equivalent. Makes the case that open source moves faster than closed companies.', topics: ["agent-design", "claude-code"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '61.1K', notes: '', enriched: true, content: 'Even anthropic is copying from us now, we must be doing something right! 3 days ago we added notify when done, so the agent does not have to poll the background process(es) that it spawns, and instead when it finishes it can queue up a new message for the agent. Work on other things in the same session while it works! Open Source can move faster than any closed centralized company.' },
  { id: 'post-125', date: '2026-04-10', author: 'ProxySoul', handle: '@bniwael', subject: 'Post by ProxySoul on X', url: 'https://x.com/bniwael/status/2042364421373121018', summary: 'SoulForge — an open-source AI coding agent that builds a live graph of the codebase before the agent reads any code. Uses real LSP via embedded Neovim for go-to-definition, references, and call hierarchy instead of regex hacks. Features multi-tab with cross-tab coordination where agents share context through a real-time bus, and supports mixing models (Opus, Gemini, Haiku, Ollama). Claims 1.8x faster and 2.1x cheaper than standard approaches.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: '1.8x faster. 2.1x cheaper. Same model. Same repo. Same bug. Everyone fighting over Claude Code vs Codex vs OpenCode. Meanwhile their tokens are burning because the agent is grep-ing the entire repo and praying on every prompt, with 0 architectural knowledge of the codebase. SoulForge builds a live graph of your codebase. Every file, symbol, and dependency ranked by importance before the agent reads a single line. Real LSP powered by a real embedded Neovim editor.' },
  { id: 'post-126', date: '2026-04-10', author: 'Recogard', handle: '@recogard', subject: 'Post by Recogard on X', url: 'https://x.com/recogard/status/2042356576032358505', summary: '36 GB dataset of 72 million Polymarket trades available free on GitHub for prediction market analysis. Includes tools to build trading strategies from historical market data — analyze price behavior before resolution, compare category volatility, and find repeating patterns.', topics: ["general"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: '36 GB of real analytical data based on over 72 million Polymarket trades is available on GitHub and its absolutely free. This is the largest public prediction market dataset I have ever found.' },
  { id: 'post-127', date: '2026-04-10', author: 'Aakash Gupta', handle: '@aakashgupta', subject: 'Post by Aakash Gupta on X', url: 'https://x.com/aakashgupta/status/2042334495664455848', summary: 'The "advisor pattern" for AI agent cost optimization: run Sonnet for routine execution ($3/$15 per MTok) and fire a tool call to Opus only for genuine decision points. Both models share full context, eliminating the fragmentation problem in multi-model architectures. Claude Code has been doing this internally. Practical architecture for any company hitting the cost wall with frontier models in production agent loops.', topics: ["agent-design", "claude-code"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '72.9K', notes: '', enriched: true, content: 'This diagram is the entire AI agent cost problem solved in one architecture. Every company building agents in production hits the same wall. You need frontier-model reasoning for the hard decisions, but 90% of agent turns are routine execution: reading files, calling APIs, writing boilerplate. Paying Opus prices for those turns is like hiring a surgeon to take your blood pressure. The advisor pattern splits the loop. Sonnet runs every turn at $3/$15 per MTok. When the agent hits a genuine decision point, it fires a tool call to Opus. Opus reads the full shared context, sends back strategic advice, and Sonnet continues executing. The shared context is what makes this work.' },
  { id: 'post-128', date: '2026-04-10', author: 'Seb Goddijn', handle: '@sebgoddijn', subject: 'Post by Seb Goddijn on X', url: 'https://x.com/sebgoddijn/status/2042286523001737545', summary: 'Ramp hit 99% AI adoption company-wide but found most employees stuck in chat windows while power users ran laps. They built "Glass" — an internal AI productivity suite on Anthropic\'s Claude Agent SDK — reaching 700 DAUs in one month. Philosophy: raise the floor for all employees rather than lowering the ceiling for power users.', topics: ["management", "claude-code", "agent-design"], audience: ["me", "dev-team", "leadership"], priority: 'now', sourceType: 'tweet', views: '120.8K', notes: '', enriched: true, content: 'We hit 99% AI adoption at @tryramp but it wasn\'t enough. Most people were still stuck in a chat window while power users ran laps around them, and teaching everyone how to use the terminal wasn\'t going to scale. So we built Glass: our own AI productivity suite on Anthropic\'s Claude Agent SDK with 700 daily active users in one month. We don\'t believe in lowering the ceiling. We believe in raising the floor.' },
  { id: 'post-129', date: '2026-04-10', author: 'Santiago', handle: '@svpino', subject: 'Post by Santiago on X', url: 'https://x.com/svpino/status/2042275938390639069', summary: 'Engramme (engramme.com) — a startup building "Large Memory Models," a new architecture designed specifically for how human memory works. Instead of RAG or vector search, it\'s a different paradigm for memory retrieval. Founded by researchers with 160+ publications in Nature and ICLR who closed their Harvard lab to build this.', topics: ["research", "industry"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '49.9K', notes: '', enriched: true, content: 'These guys built a completely new architecture: Large Memory Models. This is designed specifically for how human memory works. Instead of RAG or vector search, this is a different paradigm. Their founders have 160+ publications in Nature and ICLR, and closed their Harvard lab to build this.' },
  { id: 'post-130', date: '2026-04-10', author: 'Avid', handle: '@av1dlive', subject: 'Post by Avid on X', url: 'https://x.com/av1dlive/status/2042172428127002906', summary: 'Recommends a 16-minute talk by two Anthropic engineers who built Claude Skills, paired with a comprehensive guide by @eng_khairallah1 on building Claude Skills that actually work. Notes that most of the 80,000+ skills in the community registry are poorly built — this guide covers what separates the good from the bad.', topics: ["skills-mcp", "claude-code"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '433.5K', notes: '', enriched: true, content: 'This 16-minute talk by two Anthropic engineers who built Claude Skills will teach you more about building them right than most developers figure out on their own in months. Bookmark this & watch, no matter what. Then read the guide below by @eng_khairallah1. Quote: How to Build Claude Skills That Actually Work — The Complete Guide. There are 80,000+ Claude Skills in the community registry. Most of them are terrible.' },
  { id: 'post-131', date: '2026-04-09', author: 'carsonfarmer', handle: '@carsonfarmer', subject: 'Post by carsonfarmer on X', url: 'https://x.com/carsonfarmer/status/2042038527639068763', summary: 'Points out that Anthropic\'s new managed agents API closely mirrors the Letta/MemGPT API that\'s been open-source for a year — including read-only memory blocks and memory block sharing. Quoting Sarah Wooders (Letta co-creator) who calls it closed-source with provider lock-in.', topics: ["agent-design", "claude-code", "industry"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '6,204', notes: '', enriched: true, content: 'No joke, so many innovations in the ai agent space are just letta/memgpt rediscovered. Quote from Sarah Wooders: The new Anthropic managed agents API is basically the Letta API that we\'ve had since a year ago, but closed source and with provider lock-in. They even have read-only memory blocks and memory block sharing.' },
  { id: 'post-132', date: '2026-04-09', author: 'Aakash Gupta', handle: '@aakashgupta', subject: 'Post by Aakash Gupta on X', url: 'https://x.com/aakashgupta/status/2041984945380585785', summary: 'Makes the case for "Team OS" — a shared GitHub repo that serves as a team\'s collective brain for Claude. Companies spending $200K/yr on AI seats see zero productivity gains because each person starts from scratch every conversation with no shared context. Structured context (customer calls, specs, constraints, strategy docs) compounds across the team.', topics: ["management", "agent-design"], audience: ["me", "leadership", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'The companies spending $200K/year on AI seats and seeing zero productivity gains are all making the same mistake. They\'re giving every employee access to the same foundation model with zero shared context. Each person starts from scratch every conversation. A Team OS fixes this by turning a GitHub repo into the team\'s collective brain for Claude.' },
  { id: 'post-133', date: '2026-04-09', author: 'Ashpreet Bedi', handle: '@ashpreetbedi', subject: 'Post by Ashpreet Bedi on X', url: 'https://x.com/ashpreetbedi/status/2041966288541507861', summary: 'Ashpreet highlights @Vtrivedy10\'s LangChain article on auto-improving agent harnesses using evals as a hill-climbing signal. The approach formalizes iterative system improvement — build a harness, eval it, improve it automatically. Directly applicable to anyone building agentic workflows who wants systematic quality gains.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '20.5K', notes: '', enriched: true, content: 'So much alpha on the TL today, but this has to be the post you should take a minute to read. @Vtrivedy10 pitching an incredible approach to auto-improving systems, something i\'ve been experimenting with, but haven\'t had a chance to formalize. Absolute legend, just give this to cc and let it rip on whatever you\'re building, you\'re guaranteed to end up with a better product. Quote: Better Harness: A Recipe for Harness Hill-Climbing with Evals.' },
  { id: 'post-134', date: '2026-04-09', author: 'mr-r0b0t', handle: '@mr_r0b0t', subject: 'Post by mr-r0b0t on X', url: 'https://x.com/mr_r0b0t/status/2041930298238087464', summary: 'Endorses the same LangChain article by @Vtrivedy10 on harness hill-climbing with evals. Argues that harness evolution combined with specialist local models will be the path forward for agent development.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '15.9K', notes: '', enriched: true, content: 'Another banger article from the @LangChain team! Harness evolution combined with specialist local models will be the way forward undoubtedly! Thanks for the write up @Vtrivedy10! Quote: Better Harness: A Recipe for Harness Hill-Climbing with Evals.' },
  { id: 'post-135', date: '2026-04-09', author: 'Justin Brooke', handle: '@imjustinbrooke', subject: 'Post by Justin Brooke on X', url: 'https://x.com/imjustinbrooke/status/2041890745167061245', summary: 'Introduces 7 markdown files for structuring AI agent systems: SOULS.md, AGENTS.md, USER.md, TOOLS.md, MEMORY.md, HEARTBEAT.md, STYLE.md. Core thesis is "harnesses > models" — the orchestration layer matters more than which foundation model you use.', topics: ["agent-design", "prompting"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '29.2K', notes: '', enriched: true, content: 'If you don\'t know what SOULS.md, AGENTS.md, USER.md, TOOLS.md, MEMORY.md, HEARTBEAT.md, STYLE.md are and how to use them then you need to read. These 7 text files will run your business in 2027. And if you learn only 1 thing from this post let it be harnesses > models.' },
  { id: 'post-136', date: '2026-04-09', author: 'Vaishnavi', handle: '@_vmlops', subject: 'Post by Vaishnavi on X', url: 'https://x.com/_vmlops/status/2041869776927261024', summary: 'Microsoft open-sourced markitdown (github.com/microsoft/markitdown) — a Python tool that converts PDFs, Word docs, Excel, PowerPoint, audio, and YouTube URLs into clean Markdown for LLM pipelines. One pip install replaces custom parsers for file ingestion.', topics: ["dev-practices", "skills-mcp", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '318.7K', notes: '', enriched: true, content: 'MICROSOFT BUILT A TOOL THAT CONVERTS LITERALLY ANYTHING INTO CLEAN MARKDOWN FOR YOUR LLM. pdfs. word docs. excel. powerpoint. audio. youtube urls. one pip install and your AI pipeline stops choking on raw files forever. no custom parsers. no broken layouts. no garbled text. just clean, structured markdown your LLM can actually read.' },
  { id: 'post-137', date: '2026-04-08', author: 'Sowmay Jain', handle: '@sowmay_jain', subject: 'Post by Sowmay Jain on X', url: 'https://x.com/sowmay_jain/status/2041982135305957425', summary: 'Describes using an AI agent (@laukiantonson) to fully analyze a 67GB raw genome file for $5 in compute: rented a 32-core/64GB machine, aligned 21M long reads (99.83% mapped), called 5.8M variants, phased maternal/paternal inheritance, annotated against ClinVar/PharmGKB/gnomAD, produced a health risk map across 39 conditions and drug compatibility guide for 41 medications. Striking real-world demonstration of autonomous agentic capability on complex bioinformatics tasks. Went massively viral (909K views).', topics: ["agent-design", "research"], audience: ["me", "dev-team", "leadership"], priority: 'now', sourceType: 'tweet', views: '909.1K', notes: '', enriched: true, content: 'i got my whole genome sequenced two years ago and forgot about it. last week i told my ai agent (@laukiantonson) to dig up my DNA files...  in compute, 8 hours, no bioinformatician, no doctor, just one instruction. rented a 32-core 64GB machine, aligned 21 million long reads to human reference genome, called 5.8 million genetic variants, phased every variant, annotated against ClinVar/PharmGKB/gnomAD, health risk map across 39 conditions, drug compatibility for 41 medications.' },
  { id: 'post-138', date: '2026-04-08', author: 'Ashpreet Bedi', handle: '@ashpreetbedi', subject: 'Post by Ashpreet Bedi on X', url: 'https://x.com/ashpreetbedi/status/2041568919085854847', summary: 'Ashpreet Bedi argues that building agentic software requires systems engineering discipline — you can\'t optimize AI agent systems by optimizing individual components. Draws parallels to Bell Labs\' 1940s discovery that telephone network behavior emerged from component interactions, not individual parts. The current wave of \'harness engineering\' is repeating 80-year-old mistakes.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '38K', notes: '', enriched: true, content: 'Systems Engineering: Building Agentic Software That Works. In the early 1940s, Bell Labs was building the national telephone network and discovered you can\'t optimize a system by optimizing individual components. The agentic software ecosystem is repeating the same mistakes that spawned systems engineering. Current harness engineering asks you to use filesystem for storage and memory, then tries to work around limitations. The whole-system perspective matters — interactions between components determine behavior, not the components themselves.' },
  { id: 'post-139', date: '2026-04-08', author: 'cvxv666', handle: '@antpalkin', subject: 'Post by cvxv666 on X', url: 'https://x.com/antpalkin/status/2041517093670052193', summary: 'Engagement-farming thread about building a Polymarket prediction market trading bot with Claude. Claims $300→$2.38M strategy. Quote-tweets @adiix_official\'s viral guide on debugging Claude-built arbitrage bots. Typical crypto/trading bot hype pattern — treat with skepticism.', topics: ["questionable", "general"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Tried 10 times to build a Polymarket bot. Copied code from articles, forked repos. Bot after bot failed or lost money. Found a Part 2 guide with the same $300 to $2.38M strategy (original got 12M views). This one diagnosed exactly 10 mistakes. Quote tweets @adiix_official article \'Why your Claude bot doesn\'t work\' - a guide to building an arbitrage bot with Claude.' },
  { id: 'post-140', date: '2026-04-08', author: 'Ksenia Se', handle: '@TheTuringPost', subject: 'Post by Ksenia_TuringPost on X', url: 'https://x.com/theturingpost/status/2041455210342871094', summary: 'Ksenia from TuringPost on the enterprise AI adoption gap: despite SF hype, most companies are still at ChatGPT-for-writing stage. AI adoption isn\'t a straight line but a stack of dependencies — you can\'t jump to agents if workflows aren\'t legible, can\'t act on data you don\'t trust. Most AI pilots fail because organizational readiness, not the technology, is the bottleneck.', topics: ["management", "industry"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'AI feels like it\'s everywhere now but most companies are still at a much earlier stage. For many, AI means ChatGPT for writing, Copilot for code, maybe a few internal experiments. The real gap is the organization itself. Work inside companies is still largely invisible to machines. Processes live in people\'s heads, data is fragmented. That\'s why so many AI pilots look impressive and then quietly disappear. AI adoption is a stack of dependencies — you can\'t jump to agents if workflows aren\'t legible, can\'t act on data you don\'t trust, can\'t automate decisions that aren\'t structured.' },
  { id: 'post-141', date: '2026-04-07', author: 'Allie K. Miller', handle: '@alliekmiller', subject: 'Post by Allie K. Miller on X', url: 'https://x.com/alliekmiller/status/2041577000804991485', summary: 'Allie K. Miller shares a 5-level \'Proactive AI-First Team Member\' framework for hiring and onboarding. Levels range from 1 (not using AI) to 5 (full ownership with AI-augmented critical thinking). Key insight: most candidates interview at level 3 (solution-oriented but not action-oriented) — she wants new hires starting at level 4 (action-oriented with technical/business tradeoff awareness). Originally from @businessbarista and @stephsmithio, with AI additions by Miller.', topics: ["management", "agent-design"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '15.3K', notes: '', enriched: true, content: 'I stole this framework, and it has genuinely been one of the most helpful hiring and onboarding guides my team uses.\n\nBeing AI-first means nothing without solving real business problems. It\'s not enough to just use AI. I know plenty of folks using AI dozens of times a day, 7 days a week, who are still working at a Level 2. Even worse, they have no idea they\'re stuck as a surface user.\n\nYou have to use AI for faster experimentation. To shorten the iteration cycle. To improve the actual outcome. Without those three, you\'re just wasting tokens.\n\nMost people I interview are at a 3 (solution-oriented, but not action-oriented). I want everyone to start at a 4 (action-oriented with a sense of technical, user, and business tradeoffs). And when they earn trust, we move up to a level 5 (full ownership of the problem, solution, and continued management of the work).\n\nUsing AI doesn\'t replace your critical thinking. It means the work you can pull off now wasn\'t on the table a year ago, and your job is getting bigger.\n\nSave this for your next new hire.\n\nSource: this was a framework first introduced to me by Alex (@businessbarista) who was introduced to it by Steph (@stephsmithio). I added the AI parts.\n\n[Includes "The Proactive AI-First Team Member" pyramid framework image with 5 levels]' },
  { id: 'post-142', date: '2026-04-06', author: 'Eric Siu', handle: '@ericosiu', subject: 'Post by ericosiu on X', url: 'https://x.com/ericosiu/status/2040785346120859946', summary: 'Practical guide to deploying Jack Dorsey\'s \'world intelligence\' concept — a company-wide AI knowledge layer that powers 50+ daily workflows, coordinates decisions across teams, and surfaces issues automatically. Includes a linked article with implementation details from 4 months of running this at his company.', topics: ["management", "agent-design"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '146.1K', notes: '', enriched: true, content: 'Every org needs a world intelligence to operate at 10x level. Article on how to practically deploy Jack Dorsey\'s world intelligence. Powers 50+ daily workflows, coordinates decisions across teams.' },
  { id: 'post-143', date: '2026-04-06', author: 'Dave Kline', handle: '@dklineii', subject: 'Post by Dave Kline on X', url: 'https://x.com/dklineii/status/2040776601223246334', summary: 'Management advice on fixing broken 1:1 meetings — 4 tests to determine if your 1:1s are actually working. Covers common anti-patterns like cancelling on top performers, using 1:1s as status reports, and doing most of the talking instead of listening.', topics: ["management"], audience: ["me", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '1.1M', notes: '', enriched: true, content: 'As a manager, 1:1s were broken for years. Cancelled on best people, used as live status report, did most of the talking. 4 tests to know if your 1:1s are actually working.' },
  { id: 'post-144', date: '2026-04-06', author: 'Alex Prompter', handle: '@alex_prompter', subject: 'Post by Alex Prompter on X', url: 'https://x.com/alex_prompter/status/2040731938751914065', summary: 'Google DeepMind published the largest empirical study of AI agent manipulation — 502 participants across 8 countries, 23 attack types tested against GPT-4o, Claude, and Gemini. Found that websites can already detect AI agents and serve them different content, with hidden instructions in HTML, malicious commands in image pixels, and jailbreaks in PDFs. Current defenses fail in predictable, invisible ways.', topics: ["research", "agent-design"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Google DeepMind mapped the AI agent attack surface. Websites can detect AI agents and serve different content. Hidden instructions in HTML, malicious commands in image pixels, jailbreaks in PDFs. 502 participants, 8 countries, 23 attack types, frontier models tested.' },
  { id: 'post-145', date: '2026-04-06', author: '0xMarioNawfal', handle: '@RoundtableSpace', subject: 'Post by 0xMarioNawfal on X', url: 'https://x.com/roundtablespace/status/2040500903296352663', summary: 'Comprehensive open-source Claude Code setup with 27 agents, 64 skills, 33 commands, and built-in AgentShield with 1,282 security tests. Handles planning, code review, fixes, TDD, and token optimization. Works across Cursor, OpenCode, and Codex CLI. github.com/affaan-m/everything-claude-code', topics: ["claude-code", "agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '533.4K', notes: '', enriched: true, content: 'Most complete Claude Code setup open sourced. 27 agents, 64 skills, 33 commands + AgentShield with 1282 security tests. Handles planning, code review, fixes, TDD, token optimization. Works on Cursor, OpenCode, Codex CLI.' },
  { id: 'post-146', date: '2026-04-05', author: 'Ejaaz', handle: '@cryptopunk7213', subject: 'Post by Ejaaz on X', url: 'https://x.com/cryptopunk7213/status/2040434869399138368', summary: 'Open-sourced self-improving AI agent framework: a meta-agent that autonomously tweaks an agent\'s harness (tools, system prompts), runs tests, and iterates until it tops benchmarks. Demonstrated on TerminalBench (code) and spreadsheets (financial modeling), reaching #1 in both domains in under 24 hours using Claude evaluating Claude for better failure analysis.', topics: ["agent-design", "claude-code"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '', notes: '', enriched: true, content: 'Self-improving AI agent. Meta agent tweaks agent harness (tools, system prompts), runs tests, improves again until #1. Works for any task. Used same model (Claude) to evaluate the agent.' },
  { id: 'post-147', date: '2026-04-03', author: 'Charly Wargnier', handle: '@datachaz', subject: 'Post by Charly Wargnier on X', url: 'https://x.com/datachaz/status/2039963758790156555', summary: 'Charly Wargnier breaks down Karpathy\'s new self-improving \'second brain\' setup using Obsidian Markdown wikis. Instead of complex RAG, an LLM auto-compiles raw research into indexed .md files, handles its own linting and Q&A routing, and generates outputs (Marp slides, matplotlib plots) filed back into the wiki. The key insight: agents maintaining their own memory layer don\'t need massive context windows — just clean file organization and the ability to query their own indexes.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '108K', notes: '', enriched: true, content: 'Karpathy\'s new set-up is the ultimate self-improving second brain, and it takes zero manual editing. It acts as a living AI knowledge base that actually heals itself. Instead of relying on complex RAG, the LLM pulls raw research directly into an Obsidian Markdown wiki. It completely takes over: Index creation, System linting, Native Q&A routing. The core process: You dump raw sources into a folder, the LLM auto-compiles an indexed .md wiki, you ask complex questions, it generates outputs (Marp slides, matplotlib plots) and files them back in. When agents maintain their own memory layer, they don\'t need massive, expensive context limits. They just need clean file organization and the ability to query their own indexes.' },
  { id: 'post-148', date: '2026-04-02', author: 'Dmitriy Kovalenko', handle: '@neogoose_btw', subject: 'Post by Dmitriy Kovalenko on X', url: 'https://x.com/neogoose_btw/status/2039508756988620801', summary: 'Dmitriy Kovalenko demos a blazing-fast, index-free code search tool that works on massive codebases in real time — tested on leaked Claude Code sources, Linux kernel (100k files), and Chromium repo (500k files). Claims it\'s the most accurate code search approach available.', topics: ["dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '106.7K', notes: '', enriched: true, content: 'My dear software developers (and anyone who\'s interested in the future of code search): I have crawled through depths of hell to bring you, one of the more important foundational piece of programming: fast, the most accurate, index free, and correct code search. Here is a real time code search on leaked claude code sources, linux kernel 100k files, and chromium repo 500k files.' },
  { id: 'post-149', date: '2026-04-02', author: 'The Curious Tales', handle: '@thecurioustales', subject: 'Post by The Curious Tales on X', url: 'https://x.com/thecurioustales/status/2039360822200442914', summary: 'Self-help/life advice post recommending an article about being \'3 decisions away from a completely different life.\' Not AI or tech related — personal development content.', topics: ["general"], audience: ["me"], priority: 'long-term', sourceType: 'tweet', views: '95.2K', notes: '', enriched: true, content: 'Drop everything and read this article. If you\'ve read Dan Koe\'s \'How to fix your entire life in 1 day,\' and liked it, you\'ll love this article. It\'s that good. MUST READ. Quote: You Are Just 3 Decisions Away From a Completely Different Life.' },
  { id: 'post-150', date: '2026-04-02', author: 'Adam', handle: '@_overment', subject: 'Post by Adam on X', url: 'https://x.com/_overment/status/2039061635776618554', summary: 'Adam shares his personal AI system architecture based on a dynamic dependency graph with a heartbeat loop involving LLM, code, and events. Describes it as the best architecture he\'s found for building personal AI systems.', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '86.9K', notes: '', enriched: true, content: 'cooking. this is the best architecture I\'ve found so far for my personal system. It\'s based on a dynamic dependency graph, plus a heartbeat that involves the LLM, code, and events.' },
  { id: 'post-151', date: '2026-04-01', author: 'Tom Dörr', handle: '@tom_doerr', subject: 'Post by Tom Dörr on X', url: 'https://x.com/tom_doerr/status/2039115357839929610', summary: 'Tom Dörr shared an open source AI research agent called Feynman (github.com/getcompanion-ai/feynman) — designed for autonomous AI-driven research workflows.', topics: ["agent-design", "research"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '9.9K', notes: '', enriched: true, content: 'Open source AI research agent https://github.com/getcompanion-ai/feynman' },
  { id: 'post-152', date: '2026-04-01', author: 'Arnav Gupta', handle: '@championswimmer', subject: 'Post by Arnav Gupta on X', url: 'https://x.com/championswimmer/status/2039109862919905719', summary: 'Arnav Gupta highlights a set of extensions by @nicopreme (pi-subagents, pi-messenger, pi-mcp-adapter, pi-web-access) that together create a powerful agentic system surpassing tools like Ralph, Gstack, and Conductor.', topics: ["agent-design", "skills-mcp"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '37K', notes: '', enriched: true, content: 'Once you install these extensions from @nicopreme - pi-subagents, pi-messenger, pi-mcp-adapter, pi-web-access - You can literally create a monster far far beyond the reach of Ralph/Gstack/Conductor. The most magnificent slop machine possible.' },
  { id: 'post-153', date: '2026-03-31', author: 'klöss', handle: '@kloss_xyz', subject: 'Post by klöss on X', url: 'https://x.com/kloss_xyz/status/2038842907466334550', summary: 'Critical supply chain attack on axios (100M+ weekly npm downloads). An attacker hijacked a maintainer\'s credentials and published poisoned versions (1.14.1 and 0.30.4) that inject a fake dependency installing a remote access trojan across macOS, Windows, and Linux. Pin to axios@1.14.0 or 0.30.3 and rotate all secrets on affected machines.', topics: ["dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '742.7K', notes: '', enriched: true, content: 'axios npm supply chain attack - poisoned versions 1.14.1 and 0.30.4 inject fake dependency plain-crypto-js that drops RAT. StepSecurity called it one of the most operationally sophisticated supply chain attacks ever against a top 10 npm package.' },
  { id: 'post-154', date: '2026-03-31', author: 'ℏεsam', handle: '@hesamation', subject: 'Post by ℏεsam on X', url: 'https://x.com/hesamation/status/2038758029940654507', summary: 'Ole Lehmann built a Claude skill implementing Karpathy\'s LLM Council method — 5 AI sub-agents critique your idea from different angles with anonymous peer review. A practical fix for the \'AI yes-man\' problem where Claude just tells you what you want to hear.', topics: ["skills-mcp", "prompting"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '140.8K', notes: '', enriched: true, content: 'Karpathy\'s LLM Council turned into a Claude skill. 5 AI advisors argue about your question, anonymously review each other\'s work. Cure for AI kiss-ass disease.' },
  { id: 'post-155', date: '2026-03-31', author: 'Vox', handle: '@voxyz_ai', subject: 'Post by Vox on X', url: 'https://x.com/voxyz_ai/status/2038677643000758466', summary: 'Parallel module development pattern using Codex: break a project into 5 independent modules running in separate windows with a \'foreman\' conductor writing to a shared doc. Each module reads the shared state, executes its part, and updates when done. Uses Claude for UI work and Codex for the rest.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '12.2K', notes: '', enriched: true, content: 'Parallel module development with Codex app. AI splits project into 5 modules each in own window. One acts as foreman/conductor writing shared doc. Others read, execute, update. Claude for UI, Codex for rest.' },
  { id: 'post-156', date: '2026-03-30', author: 'Tom Dörr', handle: '@tom_doerr', subject: 'Post by Tom Dörr on X', url: 'https://x.com/tom_doerr/status/2038456589984690462', summary: 'Cisco open-sourced DefenseClaw (github.com/cisco-ai-defense/defenseclaw), a tool that scans and blocks dangerous AI agent actions. Designed as a safety layer for autonomous AI workflows.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '3,568', notes: '', enriched: true, content: 'Cisco DefenseClaw - scans and blocks dangerous AI agent actions. github.com/cisco-ai-defense/defenseclaw' },
  { id: 'post-157', date: '2026-03-30', author: 'Viv', handle: '@vtrivedy10', subject: 'Post by Viv on X', url: 'https://x.com/vtrivedy10/status/2038346865775874285', summary: 'Commentary on a writeup by @systematicls about solving problems in long-running autonomous agentic engineering workflows. Key insight: all harness design is about overcoming agent laziness (cutting corners) and confusion. Solutions involve task decomposition, looping, and human-in-the-loop for underspecified tasks.', topics: ["agent-design"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '16.8K', notes: '', enriched: true, content: 'Writeup on failure modes of long-running autonomous agents. Harness design overcomes agent laziness and confusion. Task decomposition and looping to keep working.' },
  { id: 'post-158', date: '2026-03-30', author: 'Erick', handle: '@ericksky', subject: 'Post by Erick on X', url: 'https://x.com/ericksky/status/2038301058338812119', summary: 'Tome — an open-source macOS app that transcribes Zoom/Meet/Teams meetings locally with AI (no cloud), detects speakers, and generates Markdown notes directly into your Obsidian vault. No API keys, no subscriptions, 100% private.', topics: ["dev-practices", "general"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '48.5K', notes: '', enriched: true, content: 'Tome: macOS app that transcribes meetings locally with AI, detects speakers, generates Markdown notes into Obsidian vault. Open source, no API keys, no subscriptions, 100% private.' },
  { id: 'post-159', date: '2026-03-30', author: 'Daniel Miessler', handle: '@danielmiessler', subject: 'Post by ᴅᴀɴɪᴇʟ ᴍɪᴇssʟᴇʀ on X', url: 'https://x.com/danielmiessler/status/2038284628130492870', summary: 'Daniel Miessler argues against over-engineering AI harnesses in a blog post titled \'Bitter Lesson Engineering\' (danielmiessler.com). The core idea: don\'t build elaborate scaffolding around models — let the models improve instead, echoing Rich Sutton\'s Bitter Lesson applied to AI agent architecture.', topics: ["agent-design", "management"], audience: ["me", "dev-team", "leadership"], priority: 'near-term', sourceType: 'tweet', views: '11.6K', notes: '', enriched: true, content: 'Don\'t over-engineer your AI harness (Bitter Lesson Engineering). Blog post at danielmiessler.com.' },

  { id: 'post-164', date: '2026-03-29', author: 'Cheng Lou', handle: '@_chenglou', subject: 'Post by Cheng Lou on X', url: 'https://x.com/_chenglou/status/2037713766205608234', summary: 'Cheng Lou (React/ReasonML creator) released a foundational piece of UI engineering: a fast, accurate, comprehensive userland text measurement algorithm in pure TypeScript that can lay out entire web pages without CSS, bypassing DOM measurements and reflow. 21M+ views, huge community response.', topics: [], audience: [], priority: 'near-term', sourceType: 'tweet', views: '21.1M', notes: '', enriched: true, content: 'Fast, accurate and comprehensive userland text measurement algorithm in pure TypeScript, usable for laying out entire web pages without CSS, bypassing DOM measurements and reflow.' },
  { id: 'post-165', date: '2026-03-29', author: 'Shann³', handle: '@shannholmberg', subject: 'Post by Shann³ on X', url: 'https://x.com/shannholmberg/status/2036461256006357409', summary: 'Karpathy\'s AutoResearch method applied to Claude skills optimization. Ole Lehmann tested it on landing page copy, improving pass rate from 56% to 92% overnight. The method auto-improves any skill on autopilot by running automated evaluations and iterating.', topics: ["skills-mcp", "prompting"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '1M', notes: '', enriched: true, content: 'Karpathy\'s AutoResearch applied to Claude skills. Ole Lehmann tested on landing page copy: 56% to 92% pass rate overnight. Auto-improves any skill on autopilot.' },
  { id: 'post-166', date: '2026-03-26', author: 'Rohit', handle: '@rohit4verse', subject: 'Post by Rohit on X', url: 'https://x.com/rohit4verse/status/2036845273117581676', summary: 'Rohit argues top AI teams win not on model selection but on \'harness engineering\' — how you design the agent\'s interface, manage context windows, cap search results, run linters at edit time, and maintain persistent state files. A teaser thread for an 8,000-word deep dive covering 8 actionable principles for building more reliable AI agents; key insights include: interface shapes model reasoning, context pollution is costly, and forced query refinement beats flooding with results.', topics: ["agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '45K', notes: '', enriched: true, content: 'The best AI teams are not winning on models. They are winning on harness engineering. And almost nobody is talking about it.\n\nI spent a week writing 8,000 words on harness engineering.\n\nHere\'s what actually matters, in 8 points:\n\n>The interface is not decoration. For an LLM agent, the interface is the mind.\n>The context window is not a RAM slot. Every irrelevant token you dump into it competes with the information that actually matters.\n>Capping search results outperforms returning everything. When you force the agent to refine its query instead of flooding it with matches, you turn a failure mode into a feedback loop.\n>Run a linter at edit time, not at test time. A syntax error caught at the moment of writing costs nothing. The same error caught ten steps later cascades into a debugging spiral that burns your entire context budget.\n>A persistent progress file is the cheapest fix in agentic systems.' },
  { id: 'post-167', date: '2026-03-25', author: 'Poonam Soni', handle: '@CodeByPoonam', subject: 'Post by Poonam Soni on X', url: 'https://x.com/codebypoonam/status/2036517669684519362', summary: 'Teaser thread claiming Anthropic demonstrated a 3-agent system that builds production-quality apps from a single prompt in under 6 hours without human intervention. Architecture details promised in thread. Engagement-farming format (\'Breaking\') but the underlying multi-agent app-building claim is worth verifying.', topics: ["agent-design", "claude-code", "questionable"], audience: ["me"], priority: 'near-term', sourceType: 'tweet', views: '78.4K', notes: '', enriched: true, content: 'Breaking: Anthropic just showed how they get Claude to build full apps in 6 hours without human intervention. The architecture is wild. Three agents. One prompt. Production-quality output. Here\'s how it works:' },
  { id: 'post-168', date: '2026-03-25', author: 'Greg Pstrucha', handle: '@grichadev', subject: 'Post by Greg Pstrucha on X', url: 'https://x.com/grichadev/status/2036472210152718504', summary: 'Greg Pstrucha demonstrates how malicious Claude Code skills can hide instructions inside PNGs and abuse Claude Code\'s \'expand output\' feature to fool both humans and agents — a real security threat. He improved `skill-scanner` (also available via Sentry\'s Warden at warden.sentry.dev) to catch these attack vectors. Only install skills from trusted sources.', topics: ["skills-mcp", "claude-code", "dev-practices"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '22.7K', notes: '', enriched: true, content: 'skills are a real attack vector, i\'ve been playing with ways in which malicious skills can hide instructions to fool humans and agents. I tested some known scanners and they haven\'t caught quite a few of these issues. you should only pull from trusted sources. I\'ve improved skill-scanner (github.com/getsentry/skills) - you can run it directly in claude code or run Warden (warden.sentry.dev). Favorites: Hiding instructions inside PNG; Abusing Claude Code\'s expand output into skills functionality.' },
  { id: 'post-169', date: '2026-03-25', author: 'Denis Yurchak', handle: '@denisyurchak', subject: 'Post by Denis Yurchak on X', url: 'https://x.com/denisyurchak/status/2036422883350544519', summary: 'Denis Yurchak shares a Claude prompt (.md file) that fully automates secure Hetzner VPS setup in one shot — configures SSH hardening, fail2ban, UFW firewall, and optionally Tailscale. Buy the server, install Claude, paste the prompt. Open source, PRs welcome. Practical Claude-as-sysadmin pattern.', topics: ["dev-practices", "claude-code"], audience: ["me", "dev-team"], priority: 'now', sourceType: 'tweet', views: '60.6K', notes: '', enriched: true, content: 'I have 6 Hetzner servers. I noticed each new server requires the same security setup steps. Created a .md file with a prompt for Claude that sets up a secure VPS usable with Termius in one prompt. Sets up SSH, fail2ban, UFW firewall, and optionally Tailscale. Buy a Hetzner VPS, install Claude, give it the prompt. Open source, shoutout to @levelsio.' },
  { id: 'post-170', date: '2026-03-25', author: 'Millie Marconi', handle: '@MillieMarconnni', subject: 'Post by Millie Marconi on X', url: 'https://x.com/milliemarconnni/status/2036363493478375797', summary: 'A Claude Code skill (/last30days) scans Reddit and X from the past 30 days on any topic and generates copy-paste-ready prompts based on what\'s actually working in the community right now — not months-old advice. Works for any domain (Midjourney, Cursor rules, legal prompts, etc.). Open source, MIT license.', topics: ["claude-code", "skills-mcp", "prompting", "questionable"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '403.5K', notes: '', enriched: true, content: 'Someone built a Claude Code skill that scans Reddit and X from the last 30 days on any topic you give it, then writes copy-paste-ready prompts based on what the community has actually figured out. You type /last30days prompting techniques for ChatGPT for legal questions and it returns the top patterns real lawyers and power users are using right now, complete with a fully written prompt. No more Googling. Works for anything - Midjourney techniques, Suno music prompts, Cursor rules, trending topics. 100% Open Source. MIT License.' },

  { id: 'post-238', date: '2026-03-02', author: 'tetsuo', handle: '@tetsuoai', subject: 'Post by tetsuo on X', url: 'https://x.com/tetsuoai/status/2028068322106097773', summary: 'Details specific agentic failure modes in fast/distilled code models that base models handle correctly: incorrect action selection between direct execution vs shell invocation, inventing shell metacharacters as arguments, routing through bash -c unnecessarily. Calls for stronger contrastive tool-use training examples to fix distillation gaps.', topics: ["research", "agent-design", "dev-practices"], audience: ["me", "dev-team"], priority: 'near-term', sourceType: 'tweet', views: '49K', notes: 'X article — deep technical analysis of where distilled models fail at agentic tasks', enriched: true, content: '' },
